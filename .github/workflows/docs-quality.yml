name: Docs Quality (Astro)

on:
  pull_request:
    branches: [main, master]
    paths:
      - "docs/**"
      - ".github/workflows/docs-quality.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.11"

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        working-directory: docs
        run: bun install

      - name: Astro checks
        working-directory: docs
        run: |
          bun run lint:md
          bun run lint:remark
          bun run check
          bun run build

      - name: Validate Open Graph metadata images
        run: python3 docs/scripts/check_og_images.py --site-dir docs/dist --baseurl /Millennium-Dawn

      - name: Docs hygiene checks
        run: python3 docs/scripts/check_docs_hygiene.py --repo-root . --docs-dir docs

      - name: Validate internal links and local assets
        run: python3 docs/scripts/check_site_links.py --site-dir docs/dist --baseurl /Millennium-Dawn

      - name: Accessibility baseline checks
        run: python3 docs/scripts/check_accessibility_basics.py --site-dir docs/dist

      - name: Performance budget checks
        run: python3 docs/scripts/check_perf_budgets.py --site-dir docs/dist
