version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 1
    reviewers:
      - "AngriestBird"
    assignees:
      - "AngriestBird"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "pip"
    directory: "/tools"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 1
    reviewers:
      - "AngriestBird"
    assignees:
      - "AngriestBird"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      python-tools:
        patterns:
          - "*"

  - package-ecosystem: "bun"
    directory: "/docs"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 1
    reviewers:
      - "AngriestBird"
    assignees:
      - "AngriestBird"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "documentation"
    groups:
      docs-dependencies:
        patterns:
          - "*"
