l_simp_chinese:
 inuit_nunangat_focus: "因纽特国策树"
 INU_Learning_from_Crested_Ice: "向冰脊学习"
 INU_Learning_from_Crested_Ice_desc: "上世纪五六十年代，美国在北极高纬度地区执行了代号为“铬穹顶”的行动，动用了一系列携带核武器的B-52“同温层堡垒”轰炸机。1968年，一架“同温层堡垒”轰炸机在图勒空军基地降落时坠毁，造成环境污染，但当局掩盖了此事。如今，在玩弄核武之前，我们必须回顾并分析这一事件背后的伦理问题。"
 INU_Buy_Spare_Parts: "购买备件"
 INU_Buy_Spare_Parts_desc: "为了进一步发展我们的核武器翻新计划，我们必须努力获取零部件和机械，以便重新制造或修复我们计划使用的武器。"
 INU_Project_S: "桑娜计划"
 INU_Project_S_desc: "桑娜是因纽特人海洋女神和海洋生物主宰的名字。为了纪念她作为重要生命之源所发挥的作用，我们将以她的名字命名我们的弹道导弹潜艇项目。"
 INU_Project_Ice_Shield: "冰盾计划"
 INU_Project_Ice_Shield_desc: "现在是时候检验我们的成果了。让我们向世界展示，当一个国家能够妥善运用核武器，并将其作为外交工具而非威胁他国的手段时，我们能做到什么。我们将用它来保护北极原住民的利益。"
 INU_Project_N: "北极星计划"
 INU_Project_N_desc: "为了向这颗北极星致敬，我们将以它的名字命名我们的弹道导弹计划，因为它将使我们能够越来越接近探索星辰大海的目标。"
 INU_Looking_to_the_Stars: "望向星海"
 INU_Atmospheric_Monitoring: "大气监测"
 INU_Lidar_Climate_Research: "光探测和测距气候研究"
 INU_Recover_B52_Thermonuclear_Arm: "回收B-52热核武器"
 INU_Qaanaaq_Space_base: "卡纳克空间基地"