 GENERIC_krepost_state_defense_bureau_desc: "一家行事隐秘、持有国家许可证的出口商，专门从事便携式防空导弹系统和反坦克导弹的出口，并通过不知名的中间商向客户供货。"
 GENERIC_north_plains_heavy_industries_desc: "一家规模庞大的苏联遗留工厂，大规模生产步兵武器，以高产量而非质量为目标。"
 GENERIC_sentinel_grid_networks_desc: "一家信号和C2承包商，为缺乏集成指挥基础设施的军队提供杀伤链压缩解决方案。"
 GENERIC_brunn_heavy_engineering_werke_desc: "一家起源于哈布斯堡时代的欧洲中部工程公司，生产授权和原创的火炮系统。"
 GENERIC_reichswerke_konstrukt_dynamik_desc: "一家面向中欧的双轨制武器开发商，业务涵盖履带式火炮和主战坦克平台。"
 GENERIC_vector_defense_labs_desc: "一家以成本为导向的导弹防御集成商，其理念是：每美元的拦截效果比镀金更胜一筹。"
 GENERIC_marshall_tractor_works_desc: "一家坦克制造商，沿用苏联的生产方法，强调产量和可维修性。"
 GENERIC_vanderlind_hartwell_systems_desc: "一家位于华盛顿特区的大型承包商利用其政治关系大规模获取装甲车和步兵战车项目。"
 GENERIC_mil_kamov_rotorworks_desc: "一家以苏联攻击和运输直升机设计为基础的旋翼机设计局，以耐用性而非技术复杂而闻名。"
 GENERIC_helitech_avionique_desc: "一家精品英意合资航空电子设备和直升机集成公司，提供高品质的高端电子产品。"
 GENERIC_aurora_aerodynamics_corporation_desc: "一个高度机密的秘密研发部门，为眼光独到的国防客户生产尖端战斗机和多用途飞机。"
 GENERIC_societe_europeenne_daerostructures_desc: "一个泛欧工作共享联盟，专门从事大型飞机结构、运输平台和海上巡逻机。"
 GENERIC_southwestern_aerospace_dynamics_bureau_desc: "一个由政府领导的机构，在政府的严格监督下生产多用途和战略性空中平台。"
 GENERIC_skyforge_autonomous_systems_desc: "一家位于硅谷附近的创业公司，将快速发展的创业文化应用于自主攻击无人机的研发。"
 GENERIC_compagnie_aeronatique_darmement_desc: "一家具有法国血统的武器公司，提供适用于战斗机、海军飞机和导弹的跨平台弹药标准。"
 GENERIC_whitehall_strategic_solutions_desc: "一家精品海军咨询公司转型为小型作战舰艇制造商，专门生产护卫舰和巡逻艇。"
 GENERIC_triton_maritime_defense_group_desc: "一个跨国造船厂网络，在多个伙伴国家生产驱逐舰和护卫舰。"
 GENERIC_eastern_maritime_shipbuilding_group_desc: "一家实行三班制连续作业的造船厂，按时按计划生产巡洋舰和航空母舰。"
 GENERIC_sevmorprom_submarine_yards_desc: "俄罗斯北部一家专门从事冷水作业深度和出口级攻击型及导弹平台建造的潜艇造船厂。"
 GENERIC_halland_civic_engineering_group_desc: "一家北欧工业集团，拥有涵盖民用基础设施和军事供应链的两用后勤专业知识。"
 GENERIC_second_academy_missile_bureau_desc: "一个实行严格保密制度、各自为政的弹道导弹和巡航导弹研究局。"
 GENERIC_western_orbital_systems_bureau_desc: "一个专注于下一代运载工具和太空领域感知的轨道和战略系统局。"
 GENERIC_central_heavy_atomics_power_desc: "一项结合民用反应堆技术和海军弹道导弹研发的核动力推进和武器计划。"
