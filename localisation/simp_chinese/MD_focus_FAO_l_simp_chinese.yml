l_simp_chinese:
 faroe_islands_focus: "法罗群岛国策树"
 FAO_national_decisions: "法罗群岛国家决议"
 FAO_national_decisions_desc: "法罗群岛的局势既轻松又紧张。除了政治领导人竭尽所能发展岛屿及其居民之外，他们还必须应对最终独立的紧迫问题。有些人希望立即独立，有些人则希望等待更稳定的局面。无论如何，最终法罗群岛能否真正获得自由，将取决于法罗群岛人民和丹麦的共同决定。"
 FAO_decision_independence_war: "独立战争"
 FAO_decision_independence_war_desc: "时机已到，政客们已经迫使人民做出选择。战争已经爆发，现在的问题是，丹麦能否保住王位，还是会在公众压力迫使各方达成和平后失去王位。"