 CPD_liberate_in_state_button_TT_DELAYED_DEMAND: "§Y解放§!诉求将选定的领土归还给任何合法声称拥有这些领土的国家。仍然存在的原有领土持有者将直接获得这些领土；已不存在的原有领土持有者将被复活并接收这些领土。如果原有领土持有者已经彻底丧失核心，则会从原有领土的残余部分中建立一个新的分裂国家。"
