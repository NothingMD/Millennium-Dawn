 CPD_peace_deal_explainer_ICON_TT: "和平协议如何发挥作用"
 CPD_peace_deal_explainer_ICON_TT_DELAYED: "制定和平协议很简单，只需选择上面的标签，然后选择在国内做出什么让步或提出什么要求即可。\n\n达成具有§Y负面§!成本的和平协议很可能会被AI接受，而达成具有§Y正面§!成本的和平协议则不太可能被接受。您可以将鼠标悬停在接受框上，查看AI接受协议意愿的完整分析。\n\n为玩家达成的任何和平协议均不受这些数值的影响。"
