 CPD_demilitarise_state_button_TT_DEMAND: "要求地区非军事化"
 CPD_demilitarise_state_button_TT_CONCESSION: "提议地区非军事化"
 CPD_demilitarise_state_button_TT__DELAYED_DEMAND: "要求§Y非军事化§!会将选定的敌对地区变成任何军队都不得行动的区域。其所有者不得在那里驻军，也不得修建防御工事。"
 CPD_demilitarise_state_button_TT__DELAYED_CONCESSION: "承认§Y非军事化§!也将使我们各自的国家受到同样的限制。我们将无法在承认非军事化的领土上调动或驻扎军队。"
