 CPD_annex_state_button_TT_DELAYED: "[CPD_ANNEX_STATE_TT_DELAYED_LOC]"
 CPD_annex_state_button_TT_DEMAND: "声索地区"
 CPD_annex_state_button_TT_CONCESSION: "割让地区"
 CPD_annex_state_button_TT_DELAYED_DEMAND: "选定的敌方领土连同其人民、工厂和资源一起被并入我国。我们拥有核心领土的地区战略价值减半；已宣称的地区战略价值减三分之一。要求原所有者仍然拥有的土地，战略价值则翻倍。"
 CPD_annex_state_button_TT_DELAYED_CONCESSION: "§Y割让领土§!就等于把它们拱手让给敌人。每割让一块领土，就能降低交易的总成本，从而使我们的其他要求更具吸引力。"
