 CPD_make_puppet_button_TT_DELAYED: "[CPD_MAKE_PUPPET_TT_DELAYED_LOC]"
 CPD_make_puppet_button_TT_DEMAND: "建立傀儡政府"
 CPD_make_puppet_button_TT_CONCESSION: "承认傀儡政府"
 CPD_make_puppet_button_TT_DELAYED_DEMAND: "要求§Y建立傀儡政府§!会从选定的敌方领土中划分出一个新的附庸国。这个新傀儡国继承其母国的文化，但在外交政策上听命于我们。如果我们已经拥有一个附庸国，且该附庸国的核心领土位于母国领土之上，则这些领土会并入该附庸国，而不是创建新的附庸国。"
 CPD_make_puppet_button_TT_DELAYED_CONCESSION: "承认§Y扶植傀儡政权§!，就等于让敌人从我们目前控制的领土上瓜分出一个附庸国。这个新的傀儡政权将听命于他们。"
