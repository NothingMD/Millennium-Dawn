 CPD_resource_rights_button_TT: "§Y资源开采权§!"
 CPD_resource_rights_button_TT_DELAYED: "获得§Y资源开采权§!意味着将选定地区的资源产出转移给我们。这些地区本身仍归其现有所有者所有；只有它们生产的石油、钢铁、铝、橡胶、钨和铬流入我们的经济体系。该安排将一直有效，直至另一项和平协议推翻为止。"
 CPD_military_basing_button_TT: "§Y设立军事基地§!"
 CPD_military_basing_button_TT_DELAYED: "§Y设立军事基地§!赋予我方部队在该国领土内自由通行的权利。我方部队可以自由调动和驻扎，直至使用权被撤销。"
 CPD_full_puppet_button_TT: "§Y完全傀儡化§!"
 CPD_full_puppet_button_TT_DELAYED: "要求§Y完全傀儡化§!意味着整个国家都将沦为我们的附庸。他们保留自己的边界和人口，但失去外交政策的独立性；他们的经济、人力和军事都将听命于我们。这项协议中已有的任何国家傀儡化要求都将被取消。"
 CPD_ceasefire_button_TT: "§Y停火§!"
 CPD_ceasefire_button_TT_DELAYED: "§Y停火协议§!将结束战争，前线现状保持不变。交战双方各自保留其目前控制的领土，无论这些领土此前属于哪一方。停战协议有效期为§Y720天§!，在此期间任何一方都不得再次向另一方宣战。\n\n停火和领土要求无法达成一致。启动停火将使当前方案中所有国家层面的诉求都无法纳入考虑。"
 CPD_war_reparations_button_TT: "§Y战争赔款§!"
 CPD_war_reparations_button_TT_DELAYED: "§Y战争赔款§!要求战败国每周支付其国内生产总值的一部分，为期一年。这笔款项在支付方的预算中显示为一项新的支出，在接收方的预算中显示为一项新的收入。\n\n[CPD_reparations_preview]"
 CPD_reparations_preview_TT: "预计本次交易的费用：§Y£[?CPD_rep_preview_temp|.2]B每周§!(~§Y£[?CPD_rep_preview_total_temp|.0]B§!该年)"
 CPD_forced_neutrality_button_TT: "§Y强制中立化§!"
 CPD_forced_neutrality_button_TT_DELAYED: "§Y强制中立化§!协议签署后，该国将被移出其所属阵营，并禁止其在§Y五年内§!加入或组建其他阵营。"
 CPD_regime_change_button_TT: "§Y政体更替§!"
 CPD_regime_change_button_TT_DELAYED: "§Y政体更替§!是指用我方执政党意识形态取代目标国家的执政党意识形态。他们的联盟将被解散，一位与我方政治理念相符的领导人将被扶植上台。新政府将带来为期两年的§Y战后政局动荡§!，伊斯兰国家可能会出现§Y萨拉菲派§!对外国强加统治的反抗。"
