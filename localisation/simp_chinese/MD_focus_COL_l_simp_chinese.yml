l_simp_chinese:
 colombia.1.t: "凤凰行动"
 colombia.1.d: "哥伦比亚情报部门已在厄瓜多尔边境附近的一个营地发现了FARC二号人物劳尔·雷耶斯。军方请求授权进行跨境打击以消灭他。成功将是对游击队的重大打击，但侵犯厄瓜多尔主权可能引发外交危机。"
 colombia.1.a: "发动跨境打击"
 colombia.1.b: "尊重厄瓜多尔主权"
 colombia.2.t: "哥伦比亚侵犯我国主权"
 colombia.2.d: "哥伦比亚武装部队在厄瓜多尔领土上实施军事行动，通过跨境空袭击毙了FARC指挥官劳尔·雷耶斯。这是对我国主权前所未有的侵犯。"
 colombia.2.a: "公开谴责哥伦比亚"
 colombia.2.b: "通过非正式渠道处理此事"
 colombia.3.t: "安第斯危机升级"
 colombia.3.d: "哥伦比亚以越境军事打击侵犯了厄瓜多尔的主权。厄瓜多尔谴责了此次袭击，并呼吁地区盟友提供支持。委内瑞拉必须决定是支持厄瓜多尔，还是置身于这场争端之外。"
 colombia.3.a: "支持厄瓜多尔并动员军队前往边境"
 colombia.3.b: "置身事外"
 colombia.4.t: "安第斯对峙"
 colombia.4.d: "哥伦比亚、厄瓜多尔和委内瑞拉之间的外交危机正在升级，起因是哥伦比亚对厄瓜多尔境内的哥伦比亚革命武装力量（FARC）发动了跨境打击。厄瓜多尔和委内瑞拉正在调动军队。美国必须决定如何应对。"
 colombia.4.a: "支持哥伦比亚——他们正在与FARC作战"
 colombia.4.b: "敦促各方保持克制"
 colombia.5.t: "委内瑞拉动员部队对抗我们"
 colombia.5.d: "委内瑞拉已调动军事力量至哥伦比亚边境，以声援厄瓜多尔。局势正迅速升级，有滑向武装冲突的风险。"
 colombia.5.a: "准备防御"
 colombia.6.t: "美国支持"
 colombia.6.d: "美国公开支持哥伦比亚对FARC的行动，提供外交掩护并重申双边同盟关系。"
 colombia.6.a: "我们感谢华盛顿的支持"
 colombia.7.t: "里约集团峰会"
 colombia.7.d: "里约集团已召开紧急峰会以调解安第斯危机。地区领导人正敦促通过外交途径解决。哥伦比亚有机会选择道歉并缓和局势，或坚持其跨境追剿游击队的权利。"
 colombia.7.a: "道歉并握手言和"
 colombia.7.b: "拒绝道歉"
 colombia.8.t: "危机解决"
 colombia.8.d: "哥伦比亚已在里约集团峰会上正式道歉。武装冲突的即时威胁已经过去，但两国关系依然紧张。"
 colombia.8.a: "接受道歉并退让"
 colombia.9.t: "安第斯危机缓和"
 colombia.9.d: "安第斯外交危机已在里约集团峰会上得到解决。哥伦比亚已就侵犯厄瓜多尔主权一事道歉。边境部队可撤回。"
 colombia.9.a: "撤军"
 colombia_news.1.t: "哥伦比亚跨境打击厄瓜多尔境内游击队"
 colombia_news.1.desc: "哥伦比亚军队在厄瓜多尔境内实施了一次越境空袭，击毙了哥伦比亚革命武装力量（FARC）高级指挥官劳尔·雷耶斯。基多已召回大使，并称此次行动公然违反国际法。委内瑞拉与厄瓜多尔正调动军队至哥伦比亚边境。"
 colombia_news.1.a: "我们不会为打击恐怖主义道歉"
 colombia_news.1.b: "这是对我国的侵略行为"
 colombia_news.1.c: "厄瓜多尔不会孤军奋战"
 colombia_news.1.d: "哥伦比亚打击FARC的斗争必须尊重别国主权"
 colombia_news.1.e: "安第斯山脉局势紧张"
 colombia_news.1.f: "南美洲的区域危机"
 colombia_news.2.t: "安第斯危机解决"
 colombia_news.2.desc: "2008年安第斯外交危机在里约集团峰会上结束，哥伦比亚就侵犯厄瓜多尔主权一事正式道歉。地区领导人欢迎这一和解姿态，认为这是从冲突边缘后退的一步，尽管三国之间的潜在紧张关系依然存在。"
 colombia_news.2.a: "外交手段暂告成功"
 colombia_news.2.b: "我们接受道歉，继续前行"
 colombia_news.2.c: "他们终于可以喘口气了"
 colombia_news.2.d: "南美洲从冲突中抽身"