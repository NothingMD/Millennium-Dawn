 protests_main_text: "Nous devons répondre aux attentes de nos citoyens pour éviter les manifestations et autres développements sociaux néfastes.\n§YForce des manifestations§!: [protest_strength_TT]\n§YRadicalisation des manifestations§!: [protest_radicalisation_TT][fuel_protests_TT]\n"
 OPEN_PROTESTS_BUTTON: "Open §YProtest System§! Screen"
 OPEN_PROTESTS_BUTTON_TT: "Cet écran contient des informations sur les dépenses gouvernementales attendues, la force attendue du mouvement de protestation et la radicalisation"
 PROTEST_TITLE: "§YProtests System§!"
 CLOSE_PROTEST_SCREEN: "Close §YProtests System§! Screen"
 expected_law_mechanic_tt: "Purpose of §YProtests System§!\n"
 EL_green_square_explanation_tt: "Les carrés §GVerts§! représentent le niveau de dépenses requis par nos citoyens et couvert par nos dépenses actuelles."
 EL_blue_square_explanation_tt: "Les carrés §BBleus§! représentent le niveau de dépenses NON requis par nos citoyens mais couvert par nos dépenses actuelles."
 EL_red_square_explanation_tt: "Les carrés §RRouges§! représentent le niveau de dépenses requis par nos citoyens et NON couvert par nos dépenses actuelles - ceci est la source des manifestations qui prennent de l'ampleur."
 EL_white_square_explanation_tt: "Les carrés Blancs représentent les niveaux de dépenses possibles, qui ne sont ni couverts ni attendus."
 expected_social_spending_tt: "The following values represent the expected §YGovernment Expenditure§! on §YSocial Spending.§! Every whole number indictates a level of expected spending limited to the number of laws in the category.\n\nExpected Value of §YSocial Spending§! is §Y[expected_social_spending_law_name]§! (Current Value: [?expected_welfare_spending|0Y])\n\nBreakdown of Expected §YSocial Spending§!\n-----------\nLaw, National Spirits and Tech impact on §YExpected Social Spending§!: [?ROOT.modifier@expected_welfare_modifier]\nGDP/c Modifier on §YExpected Social Spending§!: [calculate_gdp_c_modifier_welfare_spending]\n"
