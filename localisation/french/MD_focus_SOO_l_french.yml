 SOO_mnogo_parti_desc: "More parties means a more stable state."
 SOO_zakonnost: "Légalité et ordre"
 SOO_zakonnost_desc: "Nous devons amener notre État à un ordre et une légalité parfaits."
 SOO_kadrovaya_politica: "Politique de recrutement compétente"
 SOO_kadrovaya_politica_desc: "Un recrutement compétent nous protégera des personnes indésirables à l’avenir."
 SOO_svobody: "Libertés et droits des citoyens"
 SOO_svobody_desc: "We guarantee our citizens the fulfillment of all their rights."
 SOO_molodej: "Politique jeunesse"
 SOO_molodej_desc: "Youth is our future, and we will invest in it wisely."
 SOO_soc_sfera: "Politique sociale"
 SOO_soc_sfera_desc: "The social sphere is one of the priorities for our country."
 SOO_restore_selhoz: "Relancer l’agriculture"
 SOO_restore_selhoz_desc: "L’agriculture doit être relancée et devenir meilleure qu’elle ne l’était !"
 SOO_free_education: "Relancer le système éducatif"
 SOO_free_education_desc: "Our citizens deserve the best education."
 SOO_new_economic: "La nouvelle économie ossète"
 SOO_new_economic_desc: "Notre économie prospère."
 SOO_osetian_language: "Promotion de la langue ossète"
 SOO_osetian_language_desc: "Notre langue et notre culture ne doivent pas être oubliées."
 SOO_marxism: "Marxisme dans les écoles"
 SOO_marxism_desc: "Les enseignements de Marx ne seront pas oubliés."
 SOO_five_year_plan: "Premier plan quinquennal"
 SOO_five_year_plan_desc: "The free economic models of the western states hold no future for a socialist state. A return to a planned economy, preferably in the form of classical Soviet-style Five-Year Plans, will give the government firm control over the previously unregulated economy."
 SOO_connect_to_neighbours: "Se connecter aux voisins"
 SOO_connect_to_neighbours_desc: "While not all of our neighbors follow our way, we can still cooperate and maintain decent relations."
 SOO_natpop_start: "Parti du peuple"
 SOO_natpop_start_desc: "Our party will be the most popular in the history of our country."
 SOO_anti_birecracy: "Lutte contre la bureaucratie"
 SOO_anti_birecracy_desc: "À bas les bureaucrates et la domination des fonctionnaires !"
 SOO_protect_small_business: "Protéger les petites entreprises"
 SOO_protect_small_business_desc: "Small businesses are the future of our republic's economy."
 SOO_invest_climat: "Climat d’investissement"
 SOO_invest_climat_desc: "We need investments, and we will do whatever it takes to attract them."
 SOO_strahovanie: "Assurance sociale"
 SOO_strahovanie_desc: "Our citizens should have all social guarantees."
 SOO_patriotism: "Patriotisme ossète"
 SOO_patriotism_desc: "We need patriotism as much as we need air."
 SOO_zdravo: "Nation saine"
 SOO_zdravo_desc: "Une nation saine, c’est un pays sain."
 SOO_ban_sects: "Interdire les sectes"
 SOO_ban_sects_desc: "Sects and heresies are corrupting our society. We must ban and suppress all initiators and followers of these destructive organizations created to undermine ourselves."
 SOO_military_arms: "Notre propre industrie militaire"
 SOO_military_arms_desc: "It is time for our country to produce its own weapons to protect against external enemies."
 SOO_nyhaz_start: "Rétablir l’État de droit en Ossétie du Sud"
 SOO_nyhaz_start_desc: "Finally, the true patriots of this country have taken power into their own hands."
 SOO_nyhaz_narodovlastie: "Démocratie"
 SOO_nyhaz_narodovlastie_desc: "The people can sleep peacefully — the country is in safe hands."
 SOO_nyhaz_razdelenie: "Séparation des pouvoirs"
 SOO_nyhaz_razdelenie_desc: "The true principle of separation of powers is one of our main reforms and must be upheld."
 SOO_nyhaz_reform_pravo: "Réforme des forces de l’ordre"
 SOO_nyhaz_reform_pravo_desc: "We must completely transform our law enforcement agencies."
 SOO_nyhaz_kbg_invest: "Réforme du KGB"
 SOO_nyhaz_kbg_invest_desc: "It is time for the KGB to undergo a complete overhaul."
 SOO_nyhaz_omon_invest: "Réforme de l’OMON"
 SOO_nyhaz_omon_invest_desc: "The riot police and the entire OMON structure must be purged and reformed."
 SOO_nyhaz_ter_defence: "Créer une défense territoriale"
 SOO_nyhaz_ter_defence_desc: "We need people ready to protect our country in its most difficult moments."
 SOO_nyhaz_defence_doctrine: "Doctrine défensive"
 SOO_nyhaz_defence_doctrine_desc: "Notre pays n’attaque personne, et la doctrine doit refléter cela clairement."
 SOO_nyhaz_national_guard: "Garde nationale"
 SOO_nyhaz_national_guard_desc: "It is time to create our own national guard, because our armed forces are no longer enough to defend the country."
 SOO_communism_assr: "République soviétique d’Ossétie du Sud"
 SOO_skufia: "Grande Scythie"
 SER_Modernise_Belgrade: "Nouveaux tracteurs"
 SOO_commie_modifier: "Politique communiste de l’Ossétie du Sud"
 SOO_commie_modifier_desc: "L’Ossétie du Sud a de nouveau choisi la voie communiste, la bannière rouge illumine à nouveau nos terres."
 SOO_natpop_modifier: "Politique populaire de l’Ossétie du Sud"
 SOO_natpop_modifier_desc: "Le Parti du peuple s’efforce de donner le meilleur au peuple d’Ossétie du Sud, mais en raison d’un programme politique plutôt vague, il est peu probable que cela fonctionne parfaitement."
 SOO_nyhaz_modifier: "Politique populaire militariste"
 SOO_nyhaz_modifier_desc: "Our people are tired of the endless false promises of politicians. Our country should rise like a phoenix from oblivion — it is time to decide the fate of Ossetia."
 SOO_bandit_modifier: "Pouvoir du §Rclan Tadeev§!"
 SOO_bandit_modifier_desc: "The Tedeev clan has taken control of many spheres in our republic. We are losing millions because no one is willing to deal with them."
 Ossetia.1.t: "Référendum en Ossétie du Sud"
 Ossetia.1.d: "L’État d’Ossétie du Sud organise un référendum pour rejoindre notre grand pays. La majorité de ses habitants a approuvé cette décision. À nous maintenant de décider : les accueillerons-nous en Russie ?"
 Ossetia.1.a: "Bien sûr, bienvenue chez vous !"
 Ossetia.1.b: "Non, nous n’en avons pas besoin."
 Ossetia.2.t: "Référendum en Ossétie du Sud"
 Ossetia.2.d: "La Russie a accepté de nous accueillir !"
 Ossetia.2.a: "Hourra !"
 Ossetia.3.t: "Référendum en Ossétie du Sud"
 Ossetia.3.d: "La Russie a refusé de nous accepter."
 Ossetia.3.a: "Mince"
 Ossetia.4.t: "Fusion de l’Ossétie du Sud et du Nord"
 Ossetia.4.d: "L’Ossétie du Sud demande une intégration avec l’Ossétie du Nord. Sommes-nous prêts à répondre à leur demande ?"
 Ossetia.4.a: "Bien sûr"
 Ossetia.4.b: "Non"
 Ossetia.5.t: "Fusion de l’Ossétie du Sud et du Nord"
 Ossetia.5.d: "La Russie a accepté."
 Ossetia.5.a: "Hourra !"
 Ossetia.6.t: "Fusion de l’Ossétie du Sud et du Nord"
 Ossetia.6.d: "La Russie a refusé."
 Ossetia.6.a: "Mince"
 Ossetia.7.t: "Alliance des Premiers-Nés"
 Ossetia.7.d: "Les héritiers de la Grande Scythie nous proposent de créer une alliance qui guidera le monde entier sur la bonne voie et renversera nos ennemis communs."
 Ossetia.7.a: "Ensemble, nous purifierons le monde de la souillure !"
 Ossetia.7.b: "Non"
 Ossetia.8.t: "Alliance des Premiers-Nés"
 Ossetia.8.d: "Ils ont accepté de devenir nos fidèles alliés."
 Ossetia.8.a: "Hourra !"
 Ossetia.9.t: "Alliance des Premiers-Nés"
 Ossetia.9.d: "Ils ont décidé de ne pas nous aider dans notre grand objectif."
 Ossetia.9.a: "Mince"
 Ossetia.10.t: "Politique ossète"
 Ossetia.10.d: "Dans le paysage politique tumultueux de l’Ossétie du Sud en 2000, cet État de facto indépendant était confronté à des défis persistants concernant sa légitimité et des différends territoriaux avec la Géorgie. Dirigée par le président Lyudvig Chibirov, l’Ossétie du Sud faisait face à une crise de crédibilité, seuls quelques pays, dont la Russie, reconnaissant sa souveraineté, tandis que la majorité de la communauté internationale, alignée sur les Nations Unies, continuait de la considérer comme une partie intégrante de la Géorgie. L’influence de la Russie jouait un rôle clé, tant sur le plan politique que militaire, permettant à la région de maintenir son indépendance de facto. Les tensions avec la Géorgie restaient vives, marquées par des flambées de violence sporadiques le long de la frontière administrative, entravant les efforts pour une résolution pacifique. Dans ce contexte, les conflits non résolus et les préoccupations humanitaires posaient des défis majeurs, soulignant la nécessité d’efforts diplomatiques internationaux soutenus pour apporter la stabilité dans la région."
 Ossetia.10.a: "Iratta Razma"
 Ossetia.11.t: "Kokoyti élu président"
 Ossetia.11.d: "Eduard Kokoyti a été élu président en tant que candidat de l’opposition lors d’élections présidentielles directes pour le poste de président de la République d’Ossétie du Sud."
 Ossetia.11.a: "Voyons comment il s’en sort."
 Ossetia.12.t: "Proposition de Daurbek"
 Ossetia.12.d: "Notre peuple a besoin d’un nouveau leadership ! Pourquoi s’embêter avec des élections, quand notre chef doit nous être désigné par les dieux ? Je propose deux solutions à ce problème..."
 Ossetia.12.a: "En effet, Daurbek, tu es digne."
 Ossetia.12.b: "Nous devons inviter notre aristocratie de Nalchik !"
 Ossetia.12.c: "Ne te mêle pas des affaires de l’État, fou."
 Ossetia.13.t: "L’Ossétie demande notre aide !"
 Ossetia.13.d: "Ossetia asks our banks to help them in their hard financial situation."
 Ossetia.13.a: "Bien sûr !"
 Ossetia.13.b: "Sorry, no."
 Ossetia.14.t: "La Russie fournit une aide !"
 Ossetia.14.d: "Russia provides us with economic aid."
 Ossetia.14.a: "Merci."
 Ossetia.15.t: "La Russie a rejeté notre offre."
 Ossetia.15.d: "La Russie a refusé de nous fournir une aide financière."
 Ossetia.15.a: "D'accord"
 Ossetia.16.t: "La CEI-2 a été créée"
 Ossetia.16.d: "The Commonwealth of Unrecognized States is an association of unrecognized and partially recognized states in the post-Soviet space, founded in 1992. A new association of unrecognized states was born in Tiraspol: an agreement was signed on the establishment of a permanent coordinating body — a Meeting of Foreign Ministers — and an advisory council at the expert level for preparatory work between meetings, which were to be held at least twice a year."
 Ossetia.16.a: "D'accord"
