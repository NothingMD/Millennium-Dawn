l_french:
 industrial_complex: "Industrie civile"
 industrial_complex_plural: "Industries civiles"
 industrial_complex_desc: "This building provides the state with industry for production of civilian goods or construction of new buildings. Can be converted to military industry if needed.\n\nProvides the state with:\nBase Number of Required Workers: §Y206K§!\nBase GDP Output per §YCivilian Industry§!: $§Y17.5 Billion§!\nBase Energy Consumption: §R-0.5§! GW\n"
 arms_factory: "Industrie militaire"
 arms_factory_plural: "Industries militaires"
 arms_factory_desc: "This building provides the state with industry for production of new military equipment. Can be converted to civilian industry if needed.\n\nProvides the state with:\nBase Number of Required Workers: §Y18.8K§!\nBase GDP Output per §YMilitary Industry§!: $§Y1.5 Billion§!\nBase Energy Consumption: §R-0.5§! GW"
 infrastructure: "Infrastructure"
 infrastructure_plural: "Infrastructures"
 infrastructure_desc: "Ce type de bâtiments améliore les infrastructures des États, en améliorant les capacités de ravitaillement des régions stratégiques, en permettant aux divisions de se déplacer plus rapidement et en accroissant l'extraction de matières premières."
 internet_station: "Infrastructure de réseau"
 internet_station_plural: "Infrastructures de réseau"
 internet_station_desc: "§YNetwork Infrastructure§! are tall structures used in the telecommunication and radio communication fields in order to push transmissions across great distances or underground fiber optic cables and cloud computing systems.\n\nProvides the state with:\nBase Number of Required Workers: §Y12K§!\nBase GDP Output per §YNetwork Infrastructure§!: $§Y3.5 Billion§!\n\nEach level of §YNetwork Infrastructure§! improves local productivity growth speed by §G+5.00%§!.\nEach level of §YNetwork Infrastructure§! reduces the duration of §YInternational Investments§! by §G-5.00%§!."
 dockyard: "Chantier naval"
 dockyard_plural: "Chantiers navals"
 dockyard_desc: "§YNaval Yards§! are representative of a state's ability to produce military vessels of all sorts ranging from §YPatrol Boats§!, §YConvoys§!, §YDestroyers§!, §YCarriers§! and more.\n\nProvides the state with:\nBase Number of Required Workers: §Y18.8K§!\nBase GDP Output per §YNaval Yard§!: $§Y1.5 Billion§!\nBase Energy Consumption: §R-0.5§! GW"
 air_base: "Base aérienne"
 air_base_plural: "Bases aériennes"
 air_base_desc: "Une §YBase aérienne§! est une installation de stockage et un complexe militaire pour le déploiement et la préparation de vos forces aériennes. Il peut être empilé jusqu'au niveau dix, ajoutant une capacité supplémentaire de §Y50§! Avions par niveau."
 radar_station: "Station radar"
 radar_station_plural: "Stations radar"
 radar_station_desc: "Les §Ystations radar§! vous permettent de rassembler des renseignements sur les troupes ennemies des régions voisines. Elles sont composées de multiples radars et capteurs, ainsi que d'outils de renseignement et de capacités d'analyse situationnelle.\nUn niveau plus élevé augmentera sa portée effective.\nCes radars apportent aussi à la région une meilleure détection des forces aériennes ennemies, apportant aux vôtres une meilleure chance de les engager.\nQui-plus-est, les radars augmentent la détection des flottes ennemis en mer."
 RADAR_ONMAP_TOOLTIP: "Niveau de §Hstation radar§! : $LVL|G$ sur $TOT|H$\nAppartient à $WHO|H$"
 RADAR_ONMAP_DAMAGED_TOOLTIP: "Niveau de §Hstation radar§! : $LVL|R$ sur $TOT|H$\nAppartient à $WHO|H$"
 anti_air_building: "Sites SHORAD"
 anti_air_building_plural: "Sites SHORAD"
 anti_air_building_desc: "Les §Ysites SHORAD§! (Short Range Air Defense) sont des complexes et des groupes d'armes et de tactiques antiaériennes qui gèrent la défense aérienne contre les menaces aériennes à basse altitude. Ces sites travaillent ensemble pour diviser l'espace aérien en zones défendables, fournissant des cibles militaires locales et une couverture aérienne des infrastructures allant des hélicoptères aux avions volant à basse altitude en passant par les jets."
 nuclear_reactor: "Réacteur nucléaire"
 nuclear_reactor_plural: "Réacteurs nucléaires"
 nuclear_reactor_desc: "This building converts nuclear energy into electrical energy, consuming moderately enriched uranium in the process.\n\nProvides the state with:\nBase Number of Required Workers: §Y148K§!\nBase GDP Output per §YNuclear Reactor§!: $§Y4 Billion§!\nBase Power Gain: §G+5§! GW\n"
 synthetic_refinery: "Raffinerie synthétique"
 synthetic_refinery_desc: "This building provides the state with industry for production of synthetic rubber and some additional fuel production capability.\n\nProvides the state with:\nBase Number of Required Workers: §Y184K§!\nBase GDP Output per §YSynthetic Refinery§!: $§Y10 Billion§!\nBase Energy Consumption: §R-0.2§! GW\n"
 fuel_silo: "Réserve de ressources stratégiques"
 fuel_silo_plural: "Réserves de ressources stratégiques"
 fuel_silo_desc: "The §YStrategic Resource Reserve§! is an amalgamation of warehouses, dry storage, and other §YFuel§! like storage. This building provides your nation with more room for stockpiling §HFuel§! and §HResources§!.\n\nNOTE: §YResource Storage§! has an engine limitation to where if you are on §Y$export_economy$§! or §Y$globalized_trade_economy$§! you may end up sending more resources to export then to your needed production lines. If you need to start to withdraw from storage it is recommended you switch to §Y$mixed_economy$§! or lower.\n"
 offices: "Industrie de services"
 offices_plural: "Industries de services"
 offices_desc: "The §YOffice Sectors§! represents all the other industries of the economy beyond the extraction and heavy industries. These includes financial, customer, information technology, retail services and so much more.\n\nProvides the state with:\nBase Number of Required Workers: §Y473K§!\nBase GDP Output per §YOffice Sector§!: $§Y50 Billion§!\nBase Energy Consumption: §R-0.25§! GW"
 naval_base: "Base navale"
 naval_base_plural: "Bases navales"
 naval_base_desc: "Ce type de bâtiments accroît la portée des flottes et permet de les réparer. Il permet aussi d'assurer le ravitaillement outre-mer et l'exportation des ressources. Un niveau plus élevé accroît la capacité de ravitaillement."
 bunker: "Fort terrestre"
 bunker_plural: "Forts terrestres"
 bunker_desc: "En cas d'attaque, ce type de bâtiments inflige à l'assaillant une pénalité offensive de $VALUE|+%0$ par niveau de fortification. Une attaque venue de plusieurs directions réduit toutefois les effets des forts."
 coastal_bunker: "Fort côtier"
 coastal_bunker_plural: "Forts côtiers"
 coastal_bunker_desc: "En cas de débarquement, ce type de bâtiments inflige à l'assaillant une pénalité offensive de $VALUE|+%0$ par niveau de fortification."
 supply_node: "Nœud logistique"
 supply_node_desc: "Un nœud logistique est un point d'où le ravitaillement peut être distribué. Situé hors des villes, il se trouve nécessairement sur une ligne de chemin de fer."
 rail_way: "Chemin de fer"
 rail_way_plural: "Chemins de fer"
 rail_way_desc: "Les chemins de fer sont utilisés pour relier les centres logistiques entre eux afin de permettre une extraction d'approvisionnement loin de votre capitale.\n\nChaque niveau de §YChemins de fer§! améliore la vitesse de croissance de la productivité locale de §G+4,00%§!."
 fossil_powerplant: "Centrale électrique à combustible fossile"
 fossil_powerplant_plural: "Centrales électriques à combustibles fossiles"
 fossil_powerplant_desc: "§YFossil Fuel Powerplants§! is a catch-all for all fossil-based thermoelectric energy sources. These include but are not limited to; coal, natural gas and oil. §YFossil Fuel Powerplants§! will idle if energy generation is higher than consumption.\n\nProvides the state with:\nBase Number of Required Workers: §Y7.5K§!\nBase GDP Output per §YFossil Fuel Powerplant§!: $§Y1.7 Billion§!\nBase Power Gain: §G+2§! GW\n"
 fossil_powerplant_amount: "$VALUE|Y0=$"
 fossil_powerplant_resource: "£resources_strip|$FRAME$£"
 agriculture_district: "District agricole commercialisé"
 agriculture_district_plural: "Districts agricoles commercialisés"
 agriculture_district_desc: "§YCommercialized Agriculture Districts§! represents a catch-all for all non-subsistence Agriculture within our nation. It includes Agro-Industry, arable land, grain silos, butcherhouses and more.\n\nProvides the state with:\nBase Number of Required Workers: §Y188K§!\nBase GDP Output per §YCommercialized Agriculture District§!: $§Y25 Billion§!\nBase Energy Consumption: §R-0.10§! GW\n§YFuel Gain§! from States: 8\n§YLocal Supplies§!: 1.5%\n"
 agriculture_district_amount: "$VALUE|Y0=$"
 rocket_site: "Site de lancement de missiles"
 rocket_site_plural: "Site de lancement de missiles"
 rocket_site_desc: "Les §YSites de lancement de missiles§! sont un véritable fourre-tout d'équipement balistique allant des §YMissiles Sol-Air§! aux §YMissiles Balistiques Intercontinentaux§!. Cela fournit à l'état la capacité de déployer ces atouts stratégiques dans nos zones aériennes stratégiques pour aider à notre défense, ou fournir des capacités offensives."
 nuclear_facility: "Complexe R&D Civil"
 nuclear_facility_plural: "Complexes R&D Civil"
 nuclear_facility_desc: "A §YCivilian R&D Facility§! includes all types of special projects relating to the civilian industrial capacity, nuclear facilities, and more."
 air_facility: "Bâtiment d'aérodynamique et avionique"
 air_facility_plural: "Bâtiments d'aérodynamique et avionique"
 air_facility_desc: "Les complexes expérimentaux pour l'aéronautique et l'aérodynamique vous permettent de démarrer des projets de recherche sur des avions, des missiles, de l'électronique appliquée à l'aéronautique et l'espace."
 naval_facility: "Bâtiment d'ingénierie navale"
 naval_facility_plural: "Bâtiments d'ingénierie navale"
 naval_facility_desc: "Les installations expérimentales d'ingénierie navale permettent de lancer des projets de recherche liés aux navires et aux sous-marins.\nCe bâtiment ne peut être construit que dans une province littorale."
 mega_gun_emplacement: "Canon multi-charges gros calibre"
 mega_gun_emplacement_plural: "Canons multi-charges"
 mega_gun_emplacement_desc: "Basé sur le principe de la propulsion à charges multiples, ce canon de gros calibre est conçu pour réaliser des bombardements sur des portées inégalées. Grâce à une série de tunnels souterrains, il octroie aux obus des vitesses supersoniques avant de les lancer sur des cibles éloignées."
 stronghold_network: "Réseau défensif à l’échelle d'un l’état"
 stronghold_network_plural: "Réseaux défensifs à l’échelle d'un l’état"
 stronghold_network_desc: "Un réseau étendu de tunnels, tranchées, abris, positions fortifiées, dépôts de munitions et zones prédestinées à la démolition donnent au défenseur un avantage décisif contre n'importe quel assaillant."
 land_facility: "Bâtiment de combat terrestre"
 land_facility_plural: "Bâtiments de combat terrestre"
 land_facility_desc: "Les installations expérimentales pour la guerre terrestre permettent de lancer des projets de recherche liés à divers aspects de la guerre, comme des chars spéciaux ou de l'artillerie."
 renewable_energy_infra: "Infrastructure d'énergie renouvelable"
 renewable_energy_infra_plural: "Infrastructure d'énergie renouvelable"
 renewable_energy_infra_desc: "§YRenewable Energy Infrastructure§! is a catch-all for all renewable energy sources. These include but are not limited to; solar parks, wind turbines, biofuel refineries, charcoal plants, biofuel power plants, and more. As such, it uses renewable sources and produces fuel from those sources.\n\nProvides the state with:\nBase Number of Required Workers: §Y22.5K§!\nBase GDP Output per §YRenewable Energy Infrastructure§!: $§Y2 Billion§!\nBase Power Gain: §G+0.5§! GW\n"
 renewable_energy_infra_amount: "$VALUE|Y0=$"
 renewable_energy_infra_resource: "£resources_strip|$FRAME$"
 BUILDING_GROUP_TOOLTIP: "\nVous pouvez avoir jusqu'à $LEVEL|R$ de ces bâtiments par État. Ce plafond est partagé avec :"
 BUILDING_GROUP_SHARED_NAME_ENTRY: " - $NAME$"
 energy_infrastructure: "Réseau électrique renforcé"
 energy_infrastructure_desc: "Des lignes d'alimentation électrique renforcées et une infrastructure énergétique dotée d'un système de redondance multiple garantissent que nos usines continuent de produire quoi qu'il arrive."
 industrial_infrastructure: "Réseau électrique à haute capacité"
 industrial_infrastructure_desc: "L'augmentation des infrastructures énergétiques civiles existantes nous confère des capacités accrues pour les opérations industrielles à haute intensité."
 microchip_plant: "Usine de microprocesseurs"
 microchip_plant_plural: "Usine de microprocesseurs"
 microchip_plant_desc: "Production plant that converts Technology Metals and Precious Metals into Microchips, for use by both industrial and military needs.\n\nProvides the state with:\nBase Number of Required Workers: §Y37.5K§!\nBase GDP Output per §YMicrochip Plant§!: $§Y32 Billion§!\nBase Energy Consumption: §R-0.75§! GW\n20 §YMicrochip§! Production\n\nCosts:\n3 §YTechnology Metals§!\n2 §YPrecious Metals§!"
 composite_plant: "Usine composite"
 composite_plant_desc: "Production plant that combines Oil, Rubber, and Precious Metals into Composites, for use in both scientific, military, and industrial workers.\n\nProvides the state with:\nBase Number of Required Workers: §Y37.5K§!\nBase GDP Output per §YComposite Plant§!: $§Y28 Billion§!\nBase Energy Consumption: §R-0.8§! GW\n16 §YAdvanced Composite§! Production\n\nCosts:\n1 §YOil§!\n1 §YRubber§!\n1 §YPrecious Metals§!"
 composite_plant_plural: "Composite Plants"