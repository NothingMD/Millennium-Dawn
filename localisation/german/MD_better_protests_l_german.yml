 protests_main_text: "Wir müssen den Erwartungen unserer Bevölkerung gerecht werden um Proteste zu vermeiden und anderweitige schlechte Soziale Entwicklungen.\nAktuelle §Y Proteststärke§! : [protest_strength_TT]\nAktuelle §Y Radikalisierung des Protestes§! : [protest_radicalisation_TT] [fuel_protests_TT]\n"
 OPEN_PROTESTS_BUTTON: "Open §YProtest System§! Screen"
 OPEN_PROTESTS_BUTTON_TT: "Dieser Bildschirm wird schematische Informationen über die erwarteten Staatsausgaben, die erwartete Stärke der Protestbewegung und die Radikalisierung enthalten."
 PROTEST_TITLE: "§YProtests System§!"
 CLOSE_PROTEST_SCREEN: "Close §YProtests System§! Screen"
 expected_law_mechanic_tt: "Purpose of §YProtests System§!\n"
 EL_green_square_explanation_tt: "§G Grüne §! Quadrate stellen die Höhe der Ausgaben dar, die von unseren Bürgern gefordert und durch unsere derzeitigen Ausgaben gedeckt werden."
 EL_blue_square_explanation_tt: "§BBlaue§! Quadrate stellen die Höhe der Ausgaben dar, die von unseren Bürgern NICHT gefordert werden, aber durch unsere derzeitigen Ausgaben gedeckt sind."
 EL_red_square_explanation_tt: "§R Rote§! Quadrate zeigen die Stufen von Ausgaben welche von der Bevölkerung verlangt werden und NICHT durch unseren derzeitigen Ausgaben gedeckt sind - Dies ist die Quelle, wodurch Proteste stärker werden"
 EL_white_square_explanation_tt: "Die Weißen Quadrate zeigen Stufen von Ausgaben, welche nicht genutzt oder Erwartet werden."
