l_german:
 reserve_currency: "Reservewährungspolitik"
 reserve_currency_desc: "Die Währungsgrundlage der Währungsreserven und der Auslandsschulden dieses Landes. Länder, die sich an eine wichtige Reservewährung binden, erhalten Zugang zu deren Liquiditätsnetzen und Abwicklungsinfrastruktur, während Länder, die eigene Reserven halten, ihre volle Währungshoheit bewahren, allerdings auf Kosten des Zugangs zu internationalen Krediten."
 us_dollar: "[1182.owner.GetAdjective] Dollar"
 us_dollar_desc: "Die stärkste globale Reservewährung. Devisenreserven in Dollar bereitzuhalten bietet unvergleichliche Liquidität und Zugang zu internationalen Kreditmärkten, lässt das Land jedoch der Gefahr ausgesetzt, dass dollar- denominierte Schuldenkosten steigen, wenn die heimische Währung abwertet."
 euro: "Euro"
 euro_desc: "Die Währung der Europäischen Union, die weltweit am zweithäufigsten gehandelte Reservewährung. Der Euro steht den EU-Mitgliedstaaten zur Verfügung und sorgt für regionale Währungsstabilität sowie für einen bevorzugten Zugang zu den europäischen Kapitalmärkten."
 chinese_yuan: "[547.owner.GetAdjective] Yuan"
 chinese_yuan_desc: "Der Renminbi, Chinas Landeswährung, ist eine aufstrebende Reservewährung, die von Peking als Alternative zur Dominanz des Dollars gefördert wird. Handelspartner im wirtschaftlichen Einflussbereich Chinas profitieren von seinem wachsenden Abwicklungsnetzwerk."
 russia_rouble: "[652.owner.GetAdjective] Rubel"
 russia_rouble_desc: "Die Währung der Russischen Föderation, die innerhalb der Eurasischen Wirtschaftsunion und unter den postsowjetischen Handelspartnern verwendet wird. Das Halten von Rubelreserven bindet ein Land in Russlands alternative Zahlungssysteme und den Rahmen für Energieabrechnungen ein."
 japanese_yen: "[615.owner.GetAdjective] Yen"
 japanese_yen_desc: "Die Währung Japans und die dritthäufigst gehandelte Währung der Welt. Länder im wirtschaftlichen Einflussbereich Japans profitieren von den etablierten Zahlungssystemen und der relativen Stabilität des Yen, auch wenn dessen Verwendung als Reservewährung außerhalb Ostasiens nach wie vor begrenzt ist."
 british_pound: "[13.owner.GetAdjective] Pfund"
 british_pound_desc: "Die älteste Reservewährung, die noch aktiv im internationalen Zahlungsverkehr verwendet wird. Das Pfund untermauert Handels- und Finanzströme im gesamten Commonwealth und nimmt nach wie vor einen bedeutenden Anteil an den weltweiten Devisenreserven ein, wodurch es den mit dem Vereinigten Königreich verbündeten Ländern einen stabilen Zugang zu den tiefen Kapitalmärkten Londons bietet."
 swiss_frank: "[74.owner.GetAdjective] Franc"
 swiss_frank_desc: "Die Währung der Schweiz, die weltweit als sicherer Hafen gilt. Obwohl der Franken von anderen Staaten nur selten als offizielle Reservewährung genutzt wird, machen ihn die strenge geldpolitische Disziplin und die politische Neutralität der Schweiz besonders widerstandsfähig gegenüber Währungskrisen und externen Schocks."
 no_foreign_reserve: "Inländische Reserve"
 no_foreign_reserve_desc: "Dieses Land hält seine Reserven in Landeswährung statt in einer ausländischen Leitwährung. Es behält seine volle Währungshoheit und schützt sich vor externen Wechselkursschocks, verzichtet jedoch auf den Zugang zu den Liquiditätsnetzen und internationalen Kreditfazilitäten, die an die wichtigsten Reservewährungen geknüpft sind."
 currency_strength_modifier: "Währungsstärke"
 reserve_roi_bonus: "Rendite der Reservewährung"
 reserve_roi_bonus_desc: "Zusätzliche Rendite durch das Halten einer starken Reservewährung. Diese Rendite skaliert monatlich entsprechend der Währungsstärke des Emittenten und der Größe seines Akzeptanznetzwerks – eine sich abschwächende Wirtschaft des Emittenten verringert diesen Bonus."
 reserve_trade_bonus: "Anpassung des Handels mit Reservewährungen"
 reserve_trade_bonus_desc: "Ein kleiner Handelsvorteil, der sich aus der Zugehörigkeit zum selben Währungsraum ergibt. Dies spiegelt die bevorzugten Handelsbeziehungen und die gemeinsame Zahlungsinfrastruktur der Länder wider, die dieselbe Reservewährung verwenden."
 seigniorage_income_modifier: "Seigniorage-Einnahmen"
 monetary_policy_decisions: "Geldpolitik"
 monetary_policy_expand_money_supply: "Erweiterung der Geldmenge"
 monetary_policy_expand_money_supply_desc: "Weisen Sie die Zentralbank an, die Geldmenge zu erhöhen. Länder, die Reservewährungen ausgeben, profitieren am meisten davon, da die Auslandsnachfrage nach ihrer Währung einen Großteil des Inflationsdrucks auffängt. Alle Länder müssen mit einer gewissen Abwertung ihrer Währung rechnen."
 monetary_policy_austerity: "Sparmaßnahmen"
 monetary_policy_austerity_desc: "Die Finanzpolitik straffen und die Geldmenge begrenzen. Dies verringert den kurzfristigen Druck auf die Einkommen, stärkt jedoch die Währung und sorgt für Disziplin im Staatshaushalt."
 currency_backing: "Währungsdeckung"
 currency_backing_desc: "The asset standard underlying the national currency. Hard-money standards tie the currency to a commodity reserve, imposing discipline but limiting monetary flexibility. Fiat systems permit full monetary sovereignty at the cost of greater inflation risk."
 gold_standard_back: "Gold Standard"
 gold_standard_back_desc: "The national currency is pegged to and redeemable in gold at a fixed rate. Monetary expansion is constrained by physical gold reserves, instilling long-term confidence but restricting the government's ability to respond to economic crises."
 silver_standard: "Silver Standard"
 silver_standard_desc: "The national currency is backed by silver reserves at a fixed conversion rate. Less restrictive than a gold peg, the silver standard provides a degree of commodity discipline while allowing modestly greater monetary flexibility."
 bi_metal_standard: "Bimetallic Standard"
 bi_metal_standard_desc: "The currency is backed by both gold and silver at fixed exchange ratios. Historically adopted to broaden the monetary base, this standard balances commodity discipline with greater supply flexibility than a pure single-metal peg."
 no_currency_backing: "Fiat Currency"
 no_currency_backing_desc: "The currency is backed solely by the authority and creditworthiness of the issuing government. Without commodity constraints, monetary policy is fully flexible — enabling rapid crisis response but increasing susceptibility to inflationary pressure."