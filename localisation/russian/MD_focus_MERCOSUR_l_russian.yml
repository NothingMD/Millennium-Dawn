 BRA_unasul_events_TT: "§YSend invitations to all MERCOSUR member states to join UNASUL!§!"
 MER_expansion_unasul_TT: "§GUnlock§! decisions to invite South American countries to §YUNASUL§!!"
 mercosur.110.t: "Пересмотр демократической оговорки МЕРКОСУР"
 mercosur.110.d: "То, что произошло в [FROM.GetName], больше нельзя сбрасывать со счетов как внутреннее дело, имеющее исключительно внутригосударственное значение. Серьезный политический поворот в этой стране заставил усомниться в том, имеют ли открытая конкуренция и конституционные ограничения в ней еще какое-либо значение. По всему блоку министры и дипломаты открыто задаются вопросом: является ли демократическая оговорка МЕРКОСУРА серьезным обязательством или лишь формальной формулировкой. Мы должны решить, следует ли приостановить членство [FROM.GetName] или же блок пойдет на уступки ради сохранения южноамериканского рынка в неприкосновенности."
 mercosur.110.a: "Это положение должно быть выполнено."
 mercosur.110.b: "Дать последний шанс."
 mercosur.112.t: "МЕРКОСУР приостанавливает наш статус"
 mercosur.112.d: "Решение блока уже вынесено, и оно не оставляет места для сомнений. МЕРКОСУР счёл, что наш недавний курс пересек черту, установленную его демократической оговоркой, и теперь мы расплачиваемся за это в рамках самой организации. Южная Америка не отвернулась от нас навсегда, но решила отметить этот момент как событие, которое не могло остаться без ответа."
 mercosur.112.a: "Последствия вполне реальны."
 mercosur.113.t: "МЕРКОСУР предоставляет отсрочку с определенными условиями"
 mercosur.113.d: "МЕРКОСУР решил не исключать нас из своих рядов, но и не дал нам полного прощения. Мы остаемся в составе блока, вися над нами висит явная тень недоверия, и каждая столица региона понимает, что наше дальнейшее присутствие на южноамериканском рынке теперь зависит скорее от испытательного срока, чем от доверия."
 mercosur.113.a: "Мы по-прежнему находимся под пристальным вниманием."
 mercosur.114.t: "МЕРКОСУР приостанавливает членство одной из стран"
 mercosur.114.d: "После серьезного политического поворота в [FROM.GetName] дискуссии внутри МЕРКОСУР завершились принятием жесткого решения. Блок применил свою демократическую оговорку и приостановил членство [FROM.GetName], тем самым продемонстрировав, что южноамериканский рынок по-прежнему готов отстаивать политические принципы, на которых, по его утверждению, он основан."
 mercosur.114.a: "Блок проводит чёткую грань."
 mercosur.115.t: "МЕРКОСУР оставляет дверь приоткрытой"
 mercosur.115.d: "После серьезных политических перемен в [FROM.GetName] МЕРКОСУР не стал приостанавливать членство этой страны, однако это решение не означало одобрения. Блок решил на данный момент сохранить единство, одновременно вынеся [FROM.GetName] явное предупреждение, тем самым обеспечив, что вопрос о демократической легитимности будет и впредь бросать тень на ее положение в организации."
 mercosur.115.a: "Незначительная отсрочка."
 mercosur.117.t: "Пересмотр положения о демократии в УНАСУЛ"
 mercosur.117.d: "Последние события вокруг [FROM.GetName] вышли далеко за рамки внутренних споров в одной столице. Серьезный политический поворот в этой стране вызвал по всему континенту сомнения относительно того, сужается ли демократическая жизнь в ней в результате принуждения или по замыслу. В УНАСУЛ сейчас стоит вопрос: была ли эта организация создана для защиты демократических обязательств или лишь для того, чтобы говорить о них, когда это удобно. Мы должны решить, следует ли исключить [FROM.GetName] из южноамериканской структуры или же проекту будет лучше, если оставить его в составе организации, но под предупреждением."
 mercosur.117.a: "Подвесьте их к каркасу."
 mercosur.117.b: "Держите их в помещении, но под присмотром."
 mercosur.119.t: "УНАСУЛ приостанавливает наш статус"
 mercosur.119.d: "УНАСУЛ вынесла свое решение, и оно свидетельствует скорее о дистанцировании, чем о солидарности. Организация пришла к выводу, что наш недавний курс несовместим с её демократическими принципами, и в связи с этим наше членство в южноамериканской структуре было приостановлено. То, что должно было символизировать континентальную сплоченность, на самом деле стало напоминанием о том, что региональная легитимность всё же имеет свои пределы."
 mercosur.119.a: "Удар достигает цели."
 mercosur.120.t: "УНАСУЛ оставляет нас на испытательном сроке"
 mercosur.120.d: "УНАСУЛ решила не исключать нас из своих рядов, но это решение не приносит особого утешения. Мы остаемся в организации лишь под явным осуждением, и столицы Южной Америки расценят этот выбор как предупреждение о том, что наше место в проекте теперь носит условный характер, а не является заслуженным доверием."
 mercosur.120.a: "Приостановление дела, а не оправдание."
 mercosur.121.t: "УНАСУЛ приостанавливает членство одной из стран"
 mercosur.121.d: "Проанализировав серьезный политический поворот событий в [FROM.GetName], УНАСУЛ приняла решение применить свою демократическую оговорку и приостановить членство этой страны в организации. Данное решение подчеркивает, что единство Южной Америки по-прежнему опирается на политические основы и что некоторые нарушения носят настолько серьезный характер, что вынуждают открыто поднять этот вопрос."
 mercosur.121.a: "Каркас затвердевает."
 mercosur.122.t: "УНАСУЛ предоставляет отсрочку"
 mercosur.122.d: "После серьезного политического поворота в [FROM.GetName] УНАСУЛ решила пока не приостанавливать членство этой страны. Тем не менее, этот исход далеко не означает безоговорочную поддержку: организация предпочла единство разрыву, при этом ясно дав понять, что место [FROM.GetName] в южноамериканском проекте будет оставаться под вопросом."
 mercosur.122.a: "Предупреждение остается в силе."
 MER_democratic_clause_warning_tt: "§YЕсли мы являемся членами МЕРКОСУР или УНАСУЛ, этот шаг может привести к пересмотру нашего членства в соответствии с их положениями о демократии и поставить его под угрозу.§!"
 MER_mercosur_democratic_clause_vote_suspend_tt: "§YПроголосуем за отстранение.§! Если сторонники отстранения одержат верх, будут приняты следующие меры:"
 MER_mercosur_democratic_clause_vote_probation_tt: "§YПроголосуем за то, чтобы оставить их в составе МЕРКОСУР под надзором.§! Если победит сторона, выступающая за отсрочку, будут приняты следующие меры:"
 MER_mercosur_democratic_clause_suspension_tt: "§YИсключить эту страну из МЕРКОСУР.§! Удалить статус §Y«государства-члена МЕРКОСУР»§! и уменьшить рост всех остальных полноправных членов, рассчитываемый на основе членства, на §G1% роста производительности§!, §G1% мультипликатора налоговых поступлений§! и §G1% мультипликатора иностранного влияния§!."
 MER_mercosur_democratic_clause_probation_tt: "§YОставить эту страну в составе МЕРКОСУР на испытательном сроке.§! Снизить уровень стабильности, предоставляемый в качестве §Yгосударства-члена МЕРКОСУР§!, на §R5%§! для всех нынешних и будущих членов МЕРКОСУР."
 MER_unasul_democratic_clause_vote_suspend_tt: "§YПроголосуем за отстранение.§! Если сторонники отстранения одержат верх, будут приняты следующие меры:"
 MER_unasul_democratic_clause_vote_probation_tt: "§YПроголосуем за то, чтобы оставить их в составе УНАСУЛ под надзором.§! Если победит сторона, выступающая за отсрочку, будут приняты следующие меры:"
 MER_unasul_democratic_clause_suspension_tt: "§YПриостановить членство этой страны в УНАСУЛ.§! Удалить статус §Y«государства-члена УНАСУЛ»§!, уменьшить рост УНАСУЛ за счёт членов на §R1% прироста политической мощи§! и §R1% стабильности§!, а также исключить страну из Оборонного пакта УНАСУЛ, если она в него входит."
 MER_unasul_democratic_clause_probation_tt: "§YОставить эту страну в составе УНАСУЛ на испытательном сроке.§! Снизить уровень стабильности, предоставляемый в качестве §Yгосударства-члена УНАСУЛ§!, на §R5%§! для всех нынешних и будущих членов УНАСУЛ."