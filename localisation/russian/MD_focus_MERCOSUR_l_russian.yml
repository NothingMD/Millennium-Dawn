 mercosur.22.t: "Начались переговоры о полном членстве"
 mercosur.22.d: "Начались официальные переговоры с [BOL.GetName] о полном членстве в МЕРКОСУР. Это не просто символический жест: в случае успеха переговоров блок пополнится ещё одним правительством, готовым связать своё будущее с общей южноамериканской структурой."
 mercosur.22.a: "Продолжайте."
 mercosur.23.t: "Начались переговоры о полном членстве"
