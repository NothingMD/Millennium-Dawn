 mercosur.28.t: "Регистрация завершена"
 mercosur.28.d: "Длительный процесс вступления [FROM.GetName] подошел к концу. После переговоров, институциональных реформ и последовательного подтверждения приверженности этому процессу больше не осталось никаких сомнений: теперь эта страна является полноправным членом МЕРКОСУР."
 mercosur.28.a: "К нам присоединился новый участник."
 mercosur.29.t: "Официальное оформление членства"
 mercosur.29.d: "Путь, проложенный с помощью [FROM.GetName], наконец-то подошел к концу. То, что начиналось как осторожные шаги по сближению, завершилось полным признанием, и теперь наше членство в МЕРКОСУР носит официальный, а не временный характер."
 mercosur.29.a: "Мы присоединяемся к блоку."
 mercosur.30.t: "Объявлен саммит стран Южной Америки"
 mercosur.30.d: "Был объявлен новый саммит стран Южной Америки, который станет первым шагом на пути к возобновлению регионального сотрудничества. Организаторы заявили, что необходимо оживить деятельность МЕРКОСУР, укрепить экономическую координацию и обеспечить континенту более весомый коллективный голос в мировых делах. Сторонники этой инициативы приветствуют её как давно назревшее возвращение к региональным амбициям, в то время как критики задаются вопросом, сможет ли Южная Америка выйти за рамки символических жестов и перейти к устойчивой интеграции."
 mercosur.30.a: "Начинается новый этап в жизни региона."
 mercosur.31.t: "[FROM.GetName] присоединяется к МЕРКОСУР в качестве ассоциированного члена"
 mercosur.31.d: "[FROM.GetName] согласилась присоединиться к МЕРКОСУР в качестве ассоциированного члена, что стало новым шагом на пути к возрождению регионального сотрудничества в Южной Америке. Хотя статус ассоциированного члена не равнозначен полноправному членству, он открывает путь к укреплению торговых связей, политической координации и будущим переговорам о вступлении. Сторонники этого шага рассматривают его как признак того, что МЕРКОСУР вновь становится серьезной региональной силой."
 mercosur.31.a: "Этот блок растёт."
 mercosur.32.t: "[FROM.GetName] становится полноправным членом МЕРКОСУР"
 mercosur.32.d: "[FROM.GetName] вступила в МЕРКОСУР в качестве полноправного члена. То, что начиналось как региональная дипломатия, теперь превратилось в реальное расширение самого блока, усилив его экономический вес и политическое значение во всей Латинской Америке. Для сторонников интеграции это больше, чем просто дипломатический успех. Это доказательство того, что МЕРКОСУР по-прежнему способен определять будущее континента."
 mercosur.32.a: "Новый член — более сильный блок."
 BRA_unasul: "Создать УНАСУЛ"
 BRA_unasul_desc: "Сотрудничество в Южной Америке не должно больше оставаться временной инициативой. Настало время преобразовать его в постоянную региональную организацию. Создав структуру, объединяющую политический диалог, развитие инфраструктуры и социальное сотрудничество, мы сможем вывести единство Южной Америки на новый уровень."
 MER_expansion_unasul: "Расширить UNASUL"
 MER_expansion_unasul_desc: "Чтобы УНАСУЛ стала подлинно континентальной структурой, ей необходимо расширить круг участников, сохранив при этом политический импульс. Привлекая к проекту больше государств, мы сможем укрепить его легитимность как общею южноамериканской организации."
 MER_sa_corridor_development: "Развитие Южноамериканского коридора"
 MER_sa_corridor_development_desc: "Континентальная интеграция не может существовать одними лишь декларациями. Дороги, порты, железные дороги, телекоммуникации и внутренние транспортные коридоры должны быть соединены, чтобы трансграничное передвижение и торговля стали реальностью, а не оставались лишь словами."
 MER_counter_cartel: "Сотрудничество в борьбе с картелями"
 MER_counter_cartel_desc: "Незаконный оборот наркотиков, контрабанда оружия и транснациональные преступные организации ставят под угрозу как стабильность в Южной Америке, так и региональную интеграцию. Мы должны активизировать обмен разведывательной информацией и совместные действия для противодействия угрозам, которые не знают национальных границ."
 MER_sa_energy_council: "Южноамериканский энергетический совет"
 MER_sa_energy_council_desc: "Благодаря наличию нефти, газа, гидроэнергетики и крупных сетей электропередачи Южная Америка обладает огромным потенциалом для сотрудничества в энергетической сфере. Вместо того чтобы допускать превращение этих ресурсов в предмет соперничества, нам следует стремиться к региональной стабильности и взаимодополняемости."
 MER_sa_health_council: "Южноамериканский совет по вопросам здравоохранения"
 MER_sa_health_council_desc: "Сотрудничество в сфере здравоохранения не столь зрелищно, как геополитика, но является одной из наиболее практичных и эффективных областей южноамериканской интеграции. Координируя меры по эпиднадзору, обеспечению лекарственными средствами и подготовке медицинских кадров, мы можем продемонстрировать интеграцию на примере повседневной жизни."
 MER_productive_integration_and_sme_networks: "Продуктивная интеграция и сети МСП"
 MER_productive_integration_and_sme_networks_desc: "Региональная интеграция не должна ограничиваться крупными корпорациями и экспортом сырьевых товаров. Поощряя развитие малого и среднего бизнеса, региональных цепочек поставок и взаимодополняемости производств, мы сможем обеспечить этому проекту более прочную экономическую основу."
 MER_sa_defense_council: "Южноамериканский совет по вопросам обороны"
 MER_sa_defense_council_desc: "Безопасность Южной Америки не должна зависеть исключительно от внешних факторов. Прежде чем ставить перед собой грандиозные военные цели, регион должен сформировать традиции диалога, прозрачности и скоординированного кризисного управления в сфере обороны."
 MER_sa_network_for_science_and_innovation: "Южноамериканская сеть инноваций"
 MER_sa_network_for_science_and_innovation_desc: "Чтобы интеграция способствовала развитию в будущем, Южная Америка должна объединить не только рынки и ресурсы, но и знания и инновации. Научное сотрудничество может укрепить самостоятельное развитие континента."
 MER_unasul_factions: "Объединенная организация обороны УНАСУЛ"
 MER_unasul_factions_desc: "Настало время вывести южноамериканское единство за рамки чисто политического сотрудничества. Для обеспечения региональной безопасности и коллективного противодействия внешнему давлению и дестабилизационным факторам мы должны институционализировать сотрудничество в области обороны в рамках УНАСУЛ и создать новую совместную оборонную организацию, объединяющую страны Южной Америки."
 unasul_member_state_modifier: "UNASUL Member State"
 unasul_member_state_modifier_desc: "UNASUL is being rebuilt as a continental framework for political coordination, development, and common action in South America. Its benefits grow as more members join and as new councils and programs deepen the organization's reach.\n\n§YThis national spirit becomes stronger as the number of UNASUL member states increases.§!"
 MER_unasul_integrated_corridor_plan_modifier: "UNASUL Integrated Corridor Plan"
 MER_unasul_integrated_corridor_plan_modifier_desc: "UNASUL has launched a coordinated round of investment into roads, logistics, and digital links across South America. For now, member states are building transport and network infrastructure faster than usual."
 MER_unasul_energy_security_modifier: "UNASUL Energy Security Initiative"
 MER_unasul_energy_security_modifier_desc: "UNASUL has committed bloc-wide resources to energy resilience. Member states are currently accelerating fossil, nuclear, and renewable power construction under a common regional program."
 MER_unasul_joint_exercises_modifier: "UNASUL Joint Exercises"
 MER_unasul_joint_exercises_modifier_desc: "UNASUL's armed forces are currently engaged in a coordinated round of joint exercises, staff exchanges, and interoperability planning."
 MER_invite_to_unasul: "Invite [FROM.GetName] to UNASUL"
 MER_invite_to_unasul_desc: "Open formal talks with [FROM.GetName] on joining UNASUL. The acceptance rate is driven by that country's opinion of us, our influence over it, and the progress of the UNASUL tree."
 MER_unasul_integrated_corridor_plan: "Launch the Integrated Corridor Plan"
 MER_unasul_integrated_corridor_plan_desc: "Spend treasury resources to accelerate transport and network construction across all current UNASUL members for 180 days."
 MER_unasul_counter_cartel_operation: "Launch the Counter-Cartel Alliance Operation"
 MER_unasul_counter_cartel_operation_desc: "Call on every UNASUL member suffering from cartel influence to contribute political capital to a coordinated anti-cartel operation. The final impact depends on how many states commit fully."
 MER_unasul_counter_cartel_operation_tt: "Every UNASUL member affected by cartel influence will be asked to commit political capital to the operation. The final outcome depends on how strongly the participating governments back the crackdown."
 MER_unasul_energy_security_reinforcement: "Strengthen South American Energy Security"
 MER_unasul_energy_security_reinforcement_desc: "Spend treasury resources to accelerate fossil, nuclear, and renewable energy construction across all current UNASUL members for 180 days."
 MER_unasul_joint_health_improvement_project: "Launch the UNASUL Joint Health Improvement Project"
 MER_unasul_joint_health_improvement_project_desc: "Start a 180-day health coordination project. When it concludes, UNASUL gains a permanent increase to monthly population growth. This can be completed up to four times.\n\n§YThrough this project line, UNASUL's monthly population growth can reach up to +10% in total.§!"
 MER_unasul_supply_chain_strengthening: "Strengthen South American Supply Chains"
 MER_unasul_supply_chain_strengthening_desc: "Launch a 180-day supply chain coordination project. When it concludes, UNASUL gains a permanent increase to civilian industry productivity. This can be completed up to four times.\n\n§YThrough this project line, UNASUL's civilian industry productivity can reach up to +15% in total.§!"
 MER_unasul_joint_exercises: "Launch UNASUL Joint Exercises"
 MER_unasul_joint_exercises_desc: "Fund a 180-day round of UNASUL joint exercises, improving daily land, naval, and air experience gain across the bloc."
 MER_unasul_joint_research_exchange_project: "Launch the UNASUL Joint Research and Technology Exchange Project"
 MER_unasul_joint_research_exchange_project_desc: "Start a 180-day research coordination program. When it concludes, UNASUL gains a permanent increase to research speed. This can be completed up to four times.\n\n§YThrough this project line, UNASUL's research speed can reach up to +10% in total.§!"
 mercosur.35.t: "Invitation to Join UNASUL"
 mercosur.35.d: "[FROM.GetName] has invited us to join UNASUL, presenting it as the political roof under which South America might once again learn to act together. Accepting would place us inside a project that promises dialogue, coordination, and continental ambition, but also asks whether we are ready to tie ourselves to a broader regional vision."
 mercosur.35.a: "Join UNASUL."
 mercosur.35.b: "Decline for now."
 mercosur.36.t: "UNASUL Invitation Dispatched"
 mercosur.36.d: "Diplomatic talks have been opened with [FROM.GetName] over entry into UNASUL. The invitation has been sent, the case has been made, and now we wait to see whether another capital is willing to bet on the return of South American concert."
 mercosur.36.a: "Proceed."
 mercosur.37.t: "UNASUL Invitation Accepted"
 mercosur.37.d: "[FROM.GetName] has accepted our invitation and entered UNASUL. What was recently an idea discussed in speeches and communiques is beginning to take on the shape of an actual continental institution."
 mercosur.37.a: "Excellent."
 mercosur.38.t: "UNASUL Invitation Rejected"
 mercosur.38.d: "[FROM.GetName] has declined our invitation to join UNASUL for now. The dream of a wider South American framework has not been rejected outright, but neither has it yet won their confidence."
 mercosur.38.a: "We will try again later."
 mercosur.39.t: "UNASUL Membership Accepted"
 mercosur.39.d: "We have accepted [FROM.GetName]'s invitation and joined UNASUL. However uncertain the future of South American integration may be, we have chosen not to watch it from the sidelines."
 mercosur.39.a: "A wider South America."
 mercosur.40.t: "[FROM.GetName] Joins UNASUL"
 mercosur.40.d: "[FROM.GetName] has joined UNASUL, adding another voice, another bureaucracy, and another national ambition to the emerging South American framework. With each accession, the project becomes harder to dismiss as nostalgia and easier to imagine as a lasting political fact."
 mercosur.40.a: "The continent keeps aligning."
 mercosur.50.t: "Integrated Corridor Plan Activated"
 mercosur.50.d: "UNASUL's Integrated Corridor Plan has moved from conference tables to survey maps and field plans. Across the continent, ministries, engineers, and planners are now trying to turn the language of integration into roads, links, and corridors that states can actually feel."
 mercosur.50.a: "Keep building."
 mercosur.51.t: "Joint Health Project Launched"
 mercosur.51.d: "A new joint health initiative has begun under the UNASUL framework. Officials speak of shared procurement, common responses, and better coordination, but beneath the administrative language lies a larger ambition: to make regional integration felt in clinics, pharmacies, and daily life."
 mercosur.51.a: "For a healthier continent."
 mercosur.52.t: "Joint Health Project Completed"
 mercosur.52.d: "The latest joint health initiative has concluded, and its most successful practices are now being folded into UNASUL's permanent machinery. What began as a temporary effort is settling into habit, giving the organization a more human and tangible face."
 mercosur.52.a: "A durable gain."
 mercosur.53.t: "Energy Security Initiative Activated"
 mercosur.53.d: "UNASUL has launched a continent-wide push on energy security. Power planners, utility officials, and ministers are suddenly working from the same regional map, trying to ensure that South America's abundance becomes a source of stability rather than rivalry."
 mercosur.53.a: "Power the continent."
 mercosur.54.t: "Supply Chain Initiative Launched"
 mercosur.54.d: "A new UNASUL initiative on supply chains has begun. Governments, chambers of commerce, and technical agencies are now attempting the difficult work of making South American production fit together rather than merely exist beside itself."
 mercosur.54.a: "Integrate the market."
 mercosur.55.t: "Supply Chain Initiative Completed"
 mercosur.55.d: "UNASUL's latest supply chain initiative has been completed. Its practical lessons, commercial relationships, and administrative habits are no longer temporary experiments; they are becoming part of the region's permanent economic architecture."
 mercosur.55.a: "A stronger productive base."
 mercosur.56.t: "Joint Exercises Underway"
 mercosur.56.d: "UNASUL's joint exercises are now underway. Officers who once knew one another only through formal protocol are meeting in the field, exchanging methods, testing assumptions, and learning what regional coordination looks like when it is asked to function in practice."
 mercosur.56.a: "Improve readiness."
 mercosur.57.t: "Research Exchange Project Launched"
 mercosur.57.d: "A new UNASUL research and technology exchange effort has begun. Universities, institutes, and technical agencies across South America are being drawn into the same conversation, with the hope that the region can trade ideas as seriously as it trades goods."
 mercosur.57.a: "Share the knowledge."
 mercosur.58.t: "Research Exchange Project Completed"
 mercosur.58.d: "The latest research and technology exchange effort has concluded. The partnerships it created have survived the project itself, leaving behind a thicker web of contacts and a stronger sense that South American knowledge can be organized rather than merely scattered."
 mercosur.58.a: "Knowledge endures."
 mercosur.60.t: "Funding the Counter-Cartel Operation"
 mercosur.60.d: "UNASUL has launched a coordinated operation against cartel influence. The question before us is not whether the threat is real, but how much of our own political weight we are willing to place behind a regional answer."
 mercosur.60.a: "Authorize a limited interagency contribution."
 mercosur.60.b: "Throw the full weight of the state behind the operation."
 mercosur.61.t: "Counter-Cartel Operation Intensified"
 mercosur.61.d: "A majority of participating UNASUL governments chose to lean fully into the operation. The result was not a mere gesture, but a sharp regional blow against cartel networks, their patrons, and the atmosphere of fear that lets them endure."
 mercosur.61.a: "Press the advantage."
 mercosur.62.t: "Counter-Cartel Operation Completed"
 mercosur.62.d: "The operation went forward with more measured backing. Even so, the coordinated pressure unsettled cartel networks and weakened their room to maneuver, though not with the force that a more united response might have carried."
 mercosur.62.a: "A useful step."
 mercosur.75.t: "Invitation to Join the UNASUL Defense Pact"
 mercosur.75.d: "[FROM.GetName] has invited us into the UNASUL defense framework. Accepting would mean more than signing another document; it would place us inside a military understanding meant to tell both neighbors and outsiders that South America intends to stand together when pressure rises."
 mercosur.75.a: "Join the defense pact."
 mercosur.75.b: "Decline."
 mercosur.76.t: "Defense Pact Invitation Accepted"
 mercosur.76.d: "[FROM.GetName] has accepted our invitation and entered the UNASUL defense pact. The alliance is still young, but each new signature gives it more credibility, more weight, and more meaning beyond rhetoric."
 mercosur.76.a: "The alliance grows."
 mercosur.77.t: "Defense Pact Invitation Rejected"
 mercosur.77.d: "[FROM.GetName] has declined to enter the UNASUL defense pact for now. For all the language of regional solidarity, not every government is ready to let defense policy become part of a shared South American story."
 mercosur.77.a: "Unfortunate."
 mercosur.78.t: "We Join the UNASUL Defense Pact"
 mercosur.78.d: "We have accepted [FROM.GetName]'s invitation and entered the UNASUL defense pact. In doing so, we have tied our security more closely to a continental framework that aims to turn political affinity into strategic commitment."
 mercosur.78.a: "South America stands together."
 mercosur.79.t: "Tariff Alignment Completed"
 mercosur.79.d: "Weeks of negotiations, legal review, and tariff work with a prospective new member have come to a close. The process was technical on the surface, but politically it mattered for a simple reason: one more barrier between their market and ours has been made easier to imagine as temporary."
 mercosur.80.t: "Customs Modernization Completed"
 mercosur.80.d: "The customs reform effort for a prospective new member has been completed. Procedures have been clarified, border routines tightened, and the state's administrative posture brought closer to what full entry into MERCOSUR demands."
 mercosur.81.t: "Common Standards Adopted"
 mercosur.81.d: "The common standards package for a prospective new member has been carried through to completion. Rules that once reflected distance are now being rewritten in the language of compatibility, and their path into the bloc looks increasingly real."
 mercosur.82.t: "Проект логистического коридора завершен"
 mercosur.82.d: "Проект логистического коридора для потенциального нового члена завершен. То, что раньше обсуждалось в абстрактных терминах, теперь обретает конкретные очертания в виде маршрутов, складов и практических связей, благодаря которым процесс вступления воспринимается скорее как реальное событие, а не как формальность."
 mercosur.83.t: "Transport Upgrades Completed"
 mercosur.83.d: "Завершились последние транспортные работы, связанные с пакетом мер по присоединению потенциального нового члена. Расстояния никуда не исчезли, но карта теперь выглядит немного меньше, а перспектива интеграции — чуть менее теоретической."
 mercosur.84.t: "Программа по обеспечению связи завершена"
 mercosur.84.d: "The newest connectivity program for a prospective new member has been completed. Commercial traffic, administrative contact, and cross-border coordination now have firmer channels through which to move."
 mercosur.85.t: "Development Funds Disbursed"
 mercosur.85.d: "The development package for a prospective new member has been fully delivered. More than any communique, visible commitment on this scale tells their government that MERCOSUR is prepared to invest in membership rather than simply ask for trust."
 mercosur.86.t: "Civilian Investment Completed"
 mercosur.86.d: "The civilian investment phase of a prospective new member's accession package has been completed. Workshops, firms, and commercial districts now have clearer reason to see regional integration as something concrete, not merely diplomatic."
 mercosur.87.t: "Infrastructure Upgrade Completed"
 mercosur.87.d: "The infrastructure improvement program for a prospective new member has concluded. Each finished project leaves behind the same political message: accession is not just a signature, but a reorientation of how the country is connected to the wider region."
 mercosur.88.t: "Commercial Infrastructure Expanded"
 mercosur.88.d: "The commercial infrastructure project for a prospective new member has been completed. MERCOSUR's promise now appears not only in speeches, but in busier corridors, better facilities, and a clearer sense of mutual dependence."
 mercosur.89.t: "Industrial Investment Agreement Enacted"
 mercosur.89.d: "The industrial investment agreement with a prospective new member has entered into force. What had been a diplomatic understanding is becoming an economic relationship with depth, expectations, and interests powerful enough to outlive ceremony."
 mercosur.90.t: "Commercial Investment Framework Established"
 mercosur.90.d: "The commercial investment framework with a prospective new member has been established. Banks, firms, and ministries now have a sturdier bridge between them, and with it a stronger incentive to treat accession as a shared wager rather than a symbolic gesture."
 mercosur.91.t: "Financial Cooperation Package Delivered"
 mercosur.91.d: "The financial cooperation package for a prospective new member has been delivered. With this final piece in place, the accession effort no longer looks provisional; it has the feel of a country being steadily drawn into the bloc's inner circle."
 mercosur.108.t: "MERCOSUR Development Fund Round Begins"
 mercosur.108.d: "A new round of the MERCOSUR Development Fund has been set in motion. Ministries, firms, and local authorities across the bloc will read it as more than a ledger entry: proof that integration still carries money, planning, and institutional will behind it. Once again, the promise of development is moving from paper into the field."
 mercosur.108.a: "Let the funds start moving."
 mercosur.accession_project_complete.a: "Proceed."
 mercosur.93.t: "Full Membership Accepted"
 mercosur.93.d: "[FROM.GetName] has accepted our offer and entered MERCOSUR at once as a full member. There will be no long transitional stage, no carefully staged courtship, only the sudden political fact of the bloc growing larger today."
 mercosur.93.a: "Excellent."
 mercosur.94.t: "We Join MERCOSUR"
 mercosur.94.d: "Our course has been set, and MERCOSUR is no longer a forum beyond our reach but a structure we now inhabit from within. The old ambiguity about where we stand in the regional order is giving way to a harder fact: we are inside the bloc, and the continent will have to adjust to that reality."
 mercosur.94.a: "We join the bloc."
 mercosur.105.t: "Associate Status Granted"
 mercosur.105.d: "Our petition has carried us into MERCOSUR as an associate state. This is not yet the innermost chamber of the bloc, but it is enough to show that our political and economic horizon is now bending toward South American integration rather than away from it."
 mercosur.105.a: "We step closer."
 mercosur.107.t: "UNASUL Petition Approved"
 mercosur.107.d: "Our petition has brought us into UNASUL. However uncertain the future of South American integration may remain, we have chosen not to watch the experiment from afar, but to enter it and take our place inside the framework now being built."
 mercosur.107.a: "We join the project."
 mercosur_news.1.t: "The Establishment of UNASUL"
 mercosur_news.1.d: "The nations of South America have announced the establishment of UNASUL as a permanent regional organization intended to unite political dialogue, infrastructure development, and social cooperation under a single framework. With this step, South American unity enters a new stage, and regional coordination may become more institutional and enduring. Yet whether this project will truly succeed depends on whether its members can overcome their differing national interests."
 mercosur_news.1.a: "A New Stage for South America"
 mercosur_news.2.t: "UNASUL Forms a Joint Defense Pact"
 mercosur_news.2.d: "UNASUL has moved beyond economic and political coordination and announced the formation of a new South American defense pact. Backers portray it as a natural extension of regional unity, while skeptics warn that the continent is entering a more assertive and potentially divisive phase of bloc politics."
 mercosur_news.2.a: "South America closes ranks."
 mercosur_news.3.t: "A Member Steps Away from UNASUL"
 mercosur_news.3.d: "[ROOT.GetNameWithFlag] has announced its departure from the UNASUL Joint Defense Mechanism, reopening doubts that many believed had been sealed away when South America first drew its defensive lines together. Supporters of the withdrawal describe it as a return to sovereign freedom of action; critics see it as the first visible crack in a pact that depended as much on political confidence as on formal signatures. Whether this proves to be an isolated reversal or the beginning of a broader unraveling will now be watched across the continent."
 mercosur_news.3.a: "The pact no longer looks unbreakable."
 UNASUL_faction: "UNASUL Defense Pact"
 UNASUL_faction_DEF: "the UNASUL Defense Pact"
 MER_invite_to_unasul_TT: "§YThe acceptance rate is determined by that country's opinion of you, your influence over it, and the progress of the UNASUL tree!§!"
 MER_request_mercosur_associate_membership_tt: "§YSubmit a formal petition. When the review period ends, we will join MERCOSUR as an associate state.§!"
 MER_request_mercosur_full_membership_tt: "§YSubmit a formal petition. When the review period ends, we will enter MERCOSUR as a full member.§!"
 MER_request_unasul_membership_tt: "§YПодайте официальное обращение. По истечении срока рассмотрения мы присоединимся к УНАСУЛ.§!"
