 MER_GUY_infrastructure_development_desc: "Back a targeted infrastructure improvement in Guyana's capital to strengthen its readiness for accession.$MER_full_membership_step_three_desc$"
 MER_SUR_development_funds: "Contribute Development Funds for Suriname"
