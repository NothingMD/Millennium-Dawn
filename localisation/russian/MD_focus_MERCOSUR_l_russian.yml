l_russian:
 BRA_education_integration: "Интеграция в сфере образования"
 BRA_education_integration_desc: "Общий рынок становится более сильным, когда его государства-члены начинают согласовывать подходы к подготовке будущих поколений. Сотрудничество в сфере образования, взаимное признание и академические обмены помогут создать блок, который будет не только экономически связанным, но и институционально совместимым."
 BRA_mercosur_market: "Рынок МЕРКОСУР"
 BRA_mercosur_market_desc: "Как только будет заложена институциональная основа, МЕРКОСУР сможет выйти за рамки ограниченной координации и перейти к более амбициозной цели: созданию рынка с более тесными торговыми связями, более широкими инвестиционными потоками и более сильной внутренней экономической притягательностью. Именно тогда блок начнет ощущать свою мощь."
 BRA_inv_assoc: "Пригласить ассоциированные государства"
 BRA_inv_assoc_desc: "Мы поддерживаем тесные отношения с ассоциированными государствами МЕРКОСУР. Чтобы еще больше укрепить эти отношения и дать их экономикам возможность развиваться, нам следует пригласить их в МЕРКОСУР и сделать их полноправными членами этой организации."
 BRA_maintain_quo: "Укрепить МЕРКОСУР"
 BRA_maintain_quo_desc: "Расширение не всегда означает укрепление. Блок, который растёт слишком быстро, не укрепив свои основы, рискует стать больше, но при этом ослабеть. Нам следует сосредоточиться на укреплении сплочённости, эффективности и внутренней стабильности тех членов, которые у нас уже есть."
 BRA_expand_to_latin_america: "Расширение деятельности в странах Латинской Америки"
 BRA_expand_to_latin_america_desc: "МЕРКОСУР не должен ограничиваться своим нынешним составом, если есть возможность привлечь в свою сферу влияния другие страны континента. Благодаря укреплению институтов и созданию более привлекательной экономической модели мы теперь можем выйти за пределы Южного конуса и распространить своё влияние на всю Латинскую Америку."
 BRA_americas_unity: "Южноамериканский саммит"
 BRA_americas_unity_desc: "Южная Америка слишком долго находилась в плену национальных приоритетов, упущенных возможностей и незавершенных региональных проектов. Мы созовем саммит стран Южной Америки, чтобы возобновить сотрудничество на всем континенте, вернуть динамику развитию МЕРКОСУР и занять центральное место в новой региональной инициативе. Чтобы интеграция увенчалась успехом, она должна начинаться с лидерства."
 BRA_americas_unity_TT: "Страна, которая примет это решение, получит модификатор §G+15§! §Yмнение§! в отношениях с другими §Yюжноамериканскими странами§!."
 BRA_mercosur: "МЕРКОСУР"
 BRA_mercosur_desc: "МЕРКОСУР — это не просто таможенный союз. Это основа для создания более сильной и слаженной Южной Америки, основанной на торговле, общих правилах и постепенном расширении регионального влияния. Если мы намерены возглавить континент, то именно с этого нам и следует начать."
 BRA_trade_agreement: "Торговые соглашения"
 BRA_trade_agreement_desc: "Региональный блок не может существовать, опираясь исключительно на символику. Он должен снизить барьеры, согласовать коммерческие ожидания и обеспечить своим участникам ощутимые экономические выгоды. Укрепив торговые соглашения в рамках МЕРКОСУР, мы сможем превратить политическую риторику в практическую интеграцию."
 BRA_discuss_currency: "Расширить расчеты в национальной валюте"
 BRA_discuss_currency_desc: "Чтобы уменьшить чрезмерную зависимость от доллара и сделать торговлю внутри блока более стабильной и гибкой, нам следует расширить использование расчетов в национальной валюте между государствами-членами. Снижение валютных издержек и укрепление финансовой координации станут важным шагом на пути к формированию более самостоятельной региональной экономики."
 BRA_people_goods: "Свободное передвижение людей и товаров"
 BRA_people_goods_desc: "Одной торговли недостаточно для полноценной интеграции. Только тогда, когда работники, студенты, предприниматели и семьи смогут более свободно перемещаться через границы, МЕРКОСУР станет чем-то большим, чем просто рынок. Он превратится в региональное пространство, где люди живут, работают и налаживают прочные связи."
 BRA_assoc_members: "Оформить порядок присоединения"
 BRA_assoc_members_desc: "Статус ассоциированного члена имеет свои преимущества, но не позволяет завершить формирование регионального порядка. Чтобы МЕРКОСУР стал подлинным политическим и экономическим блоком, необходимо создать официальный механизм вступления, который позволит соседним государствам перейти от формального сотрудничества к полноправному членству."
 MER_secretariat_reform: "Реформа Секретариата МЕРКОСУР"
 MER_secretariat_reform_desc: "Более крупный блок невозможно вечно управлять с помощью импровизированной дипломатии. Чтобы новые члены могли доверять МЕРКОСУР как серьезной организации, необходимо укрепить его административный аппарат. Более эффективный секретариат сделает процессы вступления, координации и урегулирования споров гораздо более надежными."
 MER_infrastructure_corridor_program: "Программа развития инфраструктурных коридоров"
 MER_infrastructure_corridor_program_desc: "Региональная интеграция теряет смысл, если дороги заканчиваются на границах, а логистика в глубине страны дает сбой. МЕРКОСУР должен быть объединен не только договорами, но и инфраструктурой, обеспечивающей перемещение товаров, капитала и людей по всему континенту. Более сильный блок необходимо построить в реальности, а не просто провозгласить."
 MER_development_fund: "Фонд развития МЕРКОСУР"
 MER_development_fund_desc: "Некоторые государства не поддадутся на одни лишь обещания. Они присоединятся только в том случае, если интеграция принесет ощутимое развитие и реальные инвестиции. Создав Фонд развития МЕРКОСУР, мы сможем превратить вступление в организацию в реальную возможность и сделать членство в ней материально привлекательным."
 mercosur_member_state_modifier: "Член МЕРКОСУР"
 mercosur_member_state_modifier_desc: "МЕРКОСУР начинался как таможенно-политическая структура, в основе которой лежали Бразилия, Аргентина, Уругвай и Парагвай, а впоследствии расширился на всю Южную Америку за счет ассоциированных членов. Участие в этом блоке связывает наше будущее с более широким региональным проектом, направленным на развитие торговли, координацию действий и совместное развитие.\n\n§YЭтот национальный дух укрепляется по мере присоединения к нам всё большего числа ассоциированных и полноправных членов!§!"
 MER_corridor_investment_round_modifier: "Раунд инвестиций в коридор МЕРКОСУР"
 MER_corridor_investment_round_modifier_desc: "Новые средства выделяются на строительство дорог, логистических коридоров и проекты по развитию цифровой связи на территории МЕРКОСУР. На данный момент строительство инфраструктуры идет быстрее, чем обычно, поскольку текущий раунд инвестиций продолжается."
 MER_development_fund_round_modifier: "Выделение средств Фондом развития МЕРКОСУР"
 MER_development_fund_round_modifier_desc: "В настоящее время Фонд развития МЕРКОСУР финансирует строительство новых жилых и офисных зданий на территории всего блока. Пока продолжается этот раунд выделения средств, проекты экономического развития реализуются ускоренными темпами."
 MER_mercosur_diplomacy: "Южноамериканская интеграция"
 MER_mercosur_diplomacy_desc: "МЕРКОСУР представляет собой механизм для расширения торговли и укрепления связей на региональном рынке, тогда как УНАСУЛ — это более широкая концепция южноамериканского сотрудничества, охватывающая политический диалог, инфраструктуру и безопасность. Благодаря этим механизмам можно укрепить единство Южной Америки и продвинуть региональную интеграцию вперед.\n\n§YЭнтузиазм в отношении МЕРКОСУР и УНАСУЛ усиливается с присоединением каждого нового государства-члена!§!"
