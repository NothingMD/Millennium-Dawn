l_russian:
 colombia.1.t: "Операция «Феникс»"
 colombia.1.d: "Колумбийские спецслужбы обнаружили второго человека в иерархии ФАРК Рауля Рейеса в лагере, расположенном непосредственно за границей с Эквадором. Военные запрашивают разрешение на нанесение удара через границу с целью его ликвидации. Успех этой операции нанес бы серьезный удар по партизанам, однако нарушение суверенитета Эквадора может вызвать дипломатический кризис."
 colombia.1.a: "Нанести трансграничный удар"
 colombia.1.b: "Уважать суверенитет Эквадора"
 colombia.2.t: "Нарушение Колумбией нашего суверенитета"
 colombia.2.d: "Колумбийские вооруженные силы провели военную операцию на территории Эквадора, в ходе которой в результате трансграничного авиаудара был убит командир ФАРК Рауль Рейес. Это беспрецедентное нарушение нашего суверенитета."
 colombia.2.a: "Публично осудить Колумбию"
 colombia.2.b: "Решить это через неофициальные каналы."
 colombia.3.t: "Кризис в Андском регионе обостряется"
 colombia.3.d: "Колумбия нарушила суверенитет Эквадора, нанеся трансграничный военный удар. Эквадор осудил эту атаку и обращается к региональным союзникам за поддержкой. Венесуэла должна решить, встать ли на сторону Эквадора или остаться в стороне от этого конфликта."
 colombia.3.a: "Поддержать Эквадор и перебросить войска к границе"
 colombia.3.b: "Не вмешиваться в это."
 colombia.4.t: "Андское противостояние"
 colombia.4.d: "Между Колумбией, Эквадором и Венесуэлой разворачивается дипломатический кризис после нанесения Колумбией трансграничного удара по ФАРК. Эквадор и Венесуэла мобилизуют войска. Соединенные Штаты должны решить, как реагировать на эту ситуацию."
 colombia.4.a: "Вернуться в Колумбию — там велись боевые действия против ФАРК"
 colombia.4.b: "Призвать все стороны к сдержанности."
 colombia.5.t: "Венесуэла проводит мобилизацию против нас"
 colombia.5.d: "Венесуэла направила войска к границе с Колумбией в знак солидарности с Эквадором. Ситуация стремительно обостряется и грозит перерасти в вооруженный конфликт."
 colombia.5.a: "Подготовить нашу оборону."
 colombia.6.t: "Американская поддержка"
 colombia.6.d: "Соединенные Штаты публично поддержали действия Колумбии против ФАРК, обеспечив им дипломатическую поддержку и вновь подтвердив двусторонний союз."
 colombia.6.a: "Мы благодарны Вашингтону за поддержку"
 colombia.7.t: "Саммит Рио-группы"
 colombia.7.d: "Группа Рио созвала экстренный саммит с целью урегулирования кризиса в Андском регионе. Лидеры стран региона настаивают на дипломатическом решении конфликта. У Колумбии есть возможность принести извинения и смягчить ситуацию или же твердо отстаивать свое право преследовать партизан за пределами своей территории."
 colombia.7.a: "Извиниться и пожать руки"
 colombia.7.b: "Отказаться от извинений"
 colombia.8.t: "Кризис урегулирован"
 colombia.8.d: "Колумбия принесла официальные извинения на саммите «Группы Рио». Непосредственная угроза вооруженного конфликта миновала, хотя отношения по-прежнему остаются напряженными."
 colombia.8.a: "Принять извинения и отступить"
 colombia.9.t: "Смягчение кризиса в Андском регионе"
 colombia.9.d: "На саммите «Группы Рио» был урегулирован дипломатический кризис в Андском регионе. Колумбия принесла извинения за нарушение суверенитета Эквадора. Войска могут быть выведены с границы."
 colombia.9.a: "Отступить"
 colombia_news.1.t: "Колумбия нанесла удар по ФАРК на территории Эквадора"
 colombia_news.1.desc: "Колумбийские вооруженные силы нанесли трансграничный авиаудар по территории Эквадора, в результате чего был убит высокопоставленный командир ФАРК Рауль Рейес. Кито отозвал своего посла и назвал эту операцию грубым нарушением международного права. Венесуэла и Эквадор мобилизуют войска на границе с Колумбией."
 colombia_news.1.a: "Мы не будем извиняться за борьбу с терроризмом"
 colombia_news.1.b: "Это акт агрессии против нашего народа"
 colombia_news.1.c: "Эквадор не останется в одиночестве"
 colombia_news.1.d: "В ходе борьбы с ФАРК Колумбия должна соблюдать границы"
 colombia_news.1.e: "Анды находятся на грани"
 colombia_news.1.f: "Региональный кризис в Южной Америке"
 colombia_news.2.t: "Кризис в Андских странах урегулирован"
 colombia_news.2.desc: "Андский дипломатический кризис 2008 года завершился на саммите Группы Рио после того, как Колумбия принесла официальные извинения за нарушение суверенитета Эквадора. Лидеры стран региона приветствовали это примирение как шаг назад от края пропасти, хотя скрытая напряженность в отношениях между этими тремя странами сохраняется."
 colombia_news.2.a: "Дипломатия берет верх — пока что"
 colombia_news.2.b: "Мы принимаем извинения и смотрим в будущее"
 colombia_news.2.c: "Регион может вздохнуть с облегчением"
 colombia_news.2.d: "Южная Америка отступает от конфликта"