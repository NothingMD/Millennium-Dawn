l_russian:
 faroe_islands_focus: "Дерево фокусов Фарерских островов"
 FAO_national_decisions: "Национальные решения Фарерских островов"
 FAO_national_decisions_desc: "На Фарерских островах сложилась весьма спокойная, но в то же время напряжённая обстановка. Помимо попыток политических лидеров сделать... ну, что угодно для развития островов и их населения, им также приходится решать постоянно актуальную проблему возможной независимости. Одни хотят её получить прямо сейчас, другие предпочитают подождать, пока ситуация станет более стабильной. В любом случае, только от фарерцев и датчан зависит, станет ли остров в конечном итоге по-настоящему свободным."
 FAO_decision_independence_war: "Война за независимость"
 FAO_decision_independence_war_desc: "Настал решающий момент, и политики поставили народ перед выбором. Война объявлена, и теперь все ждут, сможет ли Дания удержать свою корону или же она утратит власть, поскольку давление общественности вынудит все стороны заключить мир."