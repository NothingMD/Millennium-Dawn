l_russian:
 inuit_nunangat_focus: "Inuit Focus Tree"
 INU_Learning_from_Crested_Ice: "Уроки, извлеченные из опыта таяния льдов."
 INU_Learning_from_Crested_Ice_desc: "В 1950-х и 60-х годах Соединенные Штаты эксплуатировали серию бомбардировщиков B-52 Stratofortress, вооруженных ядерным оружием, над Арктикой в ​​рамках операции, известной как «Хромовый купол». В 1968 году один из таких бомбардировщиков совершил аварийную посадку при попытке приземлиться на авиабазе Туле, загрязнив окружающую среду, и это было скрыто властями. Теперь мы должны оглянуться назад и проанализировать этические аспекты этой ситуации, прежде чем играть с ядерным оружием."
 INU_Buy_Spare_Parts: "Buying Spare Parts"
 INU_Buy_Spare_Parts_desc: "To further develop our nuclear refurbishing program, we must try to obtain parts and machinery in order to recreate or restore the weapons we plan on using."
 INU_Project_S: "Project Sanna"
 INU_Project_S_desc: "Sanna or Sedna is the name of the Inuit goddess of the sea and master of marine life. As a tribute to her role as an important source of sustenance, we shall name our ballistic submarine program in her honour."
 INU_Project_Ice_Shield: "Project Ice Shield"
 INU_Project_Ice_Shield_desc: "It's now time to put our work to the test. Let us show the world what we are capable of when a nation can properly handle a nuclear weapon and use it as a tool for diplomacy, not as a means of threatening others. We shall use it for protecting the interests of the indigenous peoples of the Arctic."
 INU_Project_N: "Проект Нуутиттук"
 INU_Project_N_desc: "Нуутуиттук — это название Полярной звезды, звезды Северного полюса. В знак уважения к ней мы назовем нашу программу баллистических ракет, поскольку это позволит нам еще ближе приблизиться к звездам."
 INU_Looking_to_the_Stars: "Вглядываясь в звезды"
 INU_Atmospheric_Monitoring: "Мониторинг атмосферы"
 INU_Lidar_Climate_Research: "Климатические исследования с использованием лидара"
 INU_Recover_B52_Thermonuclear_Arm: "Восстановление термоядерного вооружения B-52"
 INU_Qaanaaq_Space_base: "Космическая база Каанаак"