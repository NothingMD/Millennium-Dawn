 protests_main_text: "Necesitamos cumplir con las expectativas de nuestros ciudadanos para evitar protestas y otros malos acontecimientos sociales.\n§YFuerza de la protesta§! actual: [protest_strength_TT]\n§YProtest Radicalización§! actual: [protest_radicalisation_TT][fuel_protests_TT]\n"
 OPEN_PROTESTS_BUTTON: "Open §YProtest System§! Screen"
 OPEN_PROTESTS_BUTTON_TT: "Esta pantalla contendrá información esquemática sobre el gasto gubernamental esperado, la fuerza esperada del movimiento de protesta y la radicalización."
 PROTEST_TITLE: "§YProtests System§!"
 CLOSE_PROTEST_SCREEN: "Close §YProtests System§! Screen"
 expected_law_mechanic_tt: "Purpose of §YProtests System§!\n"
 EL_green_square_explanation_tt: "§GVerde§! Los cuadrados representan el nivel de gasto requerido por nuestros ciudadanos y cubierto por nuestro gasto actual."
 EL_blue_square_explanation_tt: "§BAzul§! Los cuadrados representan el nivel de gasto NO requerido por nuestros ciudadanos pero cubierto por nuestro gasto actual."
 EL_red_square_explanation_tt: "§RRojo§! los cuadrados representan el nivel de gasto requerido por nuestros ciudadanos y NO cubierto por nuestro gasto actual; esta es la fuente de que las protestas estén ganando fuerza."
 EL_white_square_explanation_tt: "Los cuadrados blancos representan posibles niveles de gasto, que no están cubiertos ni esperados."
 expected_social_spending_tt: "The following values represent the expected §YGovernment Expenditure§! on §YSocial Spending.§! Every whole number indictates a level of expected spending limited to the number of laws in the category.\n\nExpected Value of §YSocial Spending§! is §Y[expected_social_spending_law_name]§! (Current Value: [?expected_welfare_spending|0Y])\n\nBreakdown of Expected §YSocial Spending§!\n-----------\nLaw, National Spirits and Tech impact on §YExpected Social Spending§!: [?ROOT.modifier@expected_welfare_modifier]\nGDP/c Modifier on §YExpected Social Spending§!: [calculate_gdp_c_modifier_welfare_spending]\n"
