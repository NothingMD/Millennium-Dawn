 SOO_natpop_modifier_desc: "El Partido Popular se esfuerza por dar lo mejor al pueblo de Osetia del Sur, pero debido a un programa político bastante vago, es poco probable que esto funcione de manera ideal."
 SOO_nyhaz_modifier: "Política popular militarista"
 SOO_nyhaz_modifier_desc: "Our people are tired of the endless false promises of politicians. Our country should rise like a phoenix from oblivion — it is time to decide the fate of Ossetia."
