 SOO_bandit_modifier_desc: "The Tedeev clan has taken control of many spheres in our republic. We are losing millions because no one is willing to deal with them."
 Ossetia.1.t: "Referéndum en Osetia del Sur"
 Ossetia.1.d: "El estado de Osetia del Sur está celebrando un referéndum para unirse a nuestro gran país. La mayoría de sus residentes estuvieron de acuerdo con esta decisión. Ahora nos toca a nosotros: ¿los aceptaremos en Rusia?"
 Ossetia.1.a: "¡Por supuesto, bienvenido a casa!"
 Ossetia.1.b: "No, no los necesitamos."
 Ossetia.2.t: "Referéndum en Osetia del Sur"
 Ossetia.2.d: "¡Rusia ha aceptado nuestra propuesta!"
 Ossetia.2.a: "¡Hurra!"
 Ossetia.3.t: "Referéndum en Osetia del Sur"
 Ossetia.3.d: "Rusia se negó a aceptarnos."
 Ossetia.3.a: "Maldición"
 Ossetia.4.t: "Fusión de Osetia del Sur y del Norte"
 Ossetia.4.d: "Osetia del Sur pide la integración con Osetia del Norte, ¿estamos dispuestos a satisfacer su demanda?"
 Ossetia.4.a: "Por supuesto"
 Ossetia.4.b: "No"
 Ossetia.5.t: "Fusión de Osetia del Sur y del Norte"
 Ossetia.5.d: "Rusia ha aceptado"
 Ossetia.5.a: "¡Hurra!"
 Ossetia.6.t: "Fusión de Osetia del Sur y del Norte"
 Ossetia.6.d: "Rusia se negó"
 Ossetia.6.a: "Maldición"
 Ossetia.7.t: "Alianza de los Primogénitos"
 Ossetia.7.d: "Los herederos de la Gran Escitia nos ofrecen crear una Alianza que llevará al mundo entero por el camino correcto y derrocará a nuestros enemigos comunes."
 Ossetia.7.a: "¡Juntos limpiaremos el mundo de suciedad!"
 Ossetia.7.b: "No"
 Ossetia.8.t: "Alianza de los Primogénitos"
 Ossetia.8.d: "Han aceptado convertirse en nuestros aliados leales."
 Ossetia.8.a: "¡Hurra!"
 Ossetia.9.t: "Alianza de los Primogénitos"
 Ossetia.9.d: "Decidieron no ayudarnos en nuestro gran objetivo."
 Ossetia.9.a: "Maldición"
 Ossetia.10.t: "Política Oseta"
 Ossetia.10.d: "En el tumultuoso panorama político de Osetia del Sur en el año 2000, el estado independiente de facto lidió con constantes desafíos a su legitimidad y disputas territoriales con Georgia. Liderada por el presidente Lyudvig Chibirov, Osetia del Sur afrontó una crisis de credibilidad, ya que solo un puñado de naciones, incluida Rusia, reconocieron su soberanía, mientras que la mayoría de la comunidad internacional, en sintonía con las Naciones Unidas, seguía considerándola parte integral de Georgia. La influencia de Rusia desempeñó un papel fundamental, tanto política como militarmente, al determinar la capacidad de la región para mantener su independencia de facto. Las tensiones con Georgia se mantuvieron altas, marcadas por brotes esporádicos de violencia a lo largo de la frontera administrativa, lo que obstaculizó los esfuerzos por una solución pacífica. En este contexto, los conflictos no resueltos y las preocupaciones humanitarias plantearon desafíos significativos, lo que subrayó la necesidad de esfuerzos diplomáticos internacionales sostenidos para estabilizar la región."
 Ossetia.10.a: "Iratta Razma"
 Ossetia.11.t: "Kokoyti elegido presidente."
 Ossetia.11.d: "Eduard Kokoity fue elegido presidente como candidato de la oposición en elecciones presidenciales populares directas para el cargo de Presidente de la República de Osetia del Sur."
 Ossetia.11.a: "Veamos cómo lo hace."
 Ossetia.12.t: "La propuesta de Daurbek"
 Ossetia.12.d: "¡Nuestro pueblo necesita un nuevo liderazgo! ¿Para qué molestarse con elecciones cuando nuestro líder debe ser designado por Dios? Propongo dos soluciones para este problema..."
 Ossetia.12.a: "De hecho, Daurbek, eres digno."
 Ossetia.12.b: "¡Necesitamos invitar a nuestra aristocracia de Nalchik!"
 Ossetia.12.c: "No intervenga en asuntos de estado, lunático."
 Ossetia.13.t: "¡Osetia Pide Nuestra Ayuda!"
 Ossetia.13.d: "Ossetia asks our banks to help them in their hard financial situation."
 Ossetia.13.a: "¡Claro!"
 Ossetia.13.b: "Sorry, no."
 Ossetia.14.t: "¡Rusia ofrece ayuda!"
 Ossetia.14.d: "Russia provides us with economic aid."
 Ossetia.14.a: "¡Gracias!"
 Ossetia.15.t: "Rusia rechazó nuestra oferta."
 Ossetia.15.d: "Rusia rechazó brindarnos ayuda financiera."
 Ossetia.15.a: "De acuerdo"
 Ossetia.16.t: "Se creó el CEI-2"
 Ossetia.16.d: "The Commonwealth of Unrecognized States is an association of unrecognized and partially recognized states in the post-Soviet space, founded in 1992. A new association of unrecognized states was born in Tiraspol: an agreement was signed on the establishment of a permanent coordinating body — a Meeting of Foreign Ministers — and an advisory council at the expert level for preparatory work between meetings, which were to be held at least twice a year."
 Ossetia.16.a: "De acuerdo"
