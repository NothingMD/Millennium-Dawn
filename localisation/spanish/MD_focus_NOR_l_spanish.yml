 NOR_modernize_bergan_line: "Línea Bergen"
 NOR_modernize_bergan_line_desc: "La Línea de Bergen es una vía férrea escénica de calibre estándar de 372 kilómetros que proporciona transporte y flexibilidad muy necesarios en nuestra nación."
 NOR_dovre_line: "La línea Dovre"
 NOR_dovre_line_desc: "La Línea Dovre es la línea principal de 484 km encargada de distribuir eficazmente suministros por todo el país."
 NOR_higher_relations_more_likely_TT: "Son §HMás Propensos§! a Aceptar si:\n- Su §HOpinión§! sobre nosotros es al menos de §H45§!"
 NOR_UK_AGREED: "El [ENG.GetFlag] §H [ENG.GetName]§! Ha Aceptado Nuestra Solicitud"
 NOR_wind_farms: "Parques eólicos"
 NOR_wind_farms_desc: "Se han erigido parques eólicos en varias partes de nuestro país con la esperanza de cosechar energía más limpia para nuestra nación de manera más eficiente."
 NOR_bergen_line: "La línea Bergen"
 NOR_bergen_line_desc: "La Línea de Bergen es una vía férrea escénica de calibre estándar de 372 kilómetros que proporciona transporte y flexibilidad muy necesarios en nuestra nación."
 NOR_taking_decision: "¿Tiene otra decisión activa?"
 NOR_statoil: "Statoil"
 NOR_statoil_desc: "Comprar más acciones en las refinerías de petróleo mejorará nuestra capacidad de ampliar nuestro alcance para que nuestro rico suministro de petróleo pueda utilizarse en beneficio de nuestra gente. La idea es: comprar, comprar, comprar y luego vender, vender, vender."
 NOR_norwegian_armed_forces: "Fuerzas Armadas de Noruega"
 NOR_norwegian_armed_forces_desc: "La valentía y la adaptabilidad de las grandes fuerzas armadas están listas para defenderse de cualquier peligro, día y noche. Están entrenadas para todas las condiciones y conocen su misión: proteger al pueblo noruego para que siga teniendo paz y libertad."
 NOR_norwegian_navy_forces: "Fuerza Naval de Noruega"
 NOR_norwegian_navy_forces_desc: "The main purpose of our navy is to protect the interest of our trade, although it isn't challenged very often. We still require a deterrence force to command the seas that we have a right to."
 NOR_norwegian_land_forces: "Fuerza terrestre noruega"
 NOR_norwegian_land_forces_desc: "The Norwegian Army is the land warfare service branch of the Norwegian Armed Forces. The Army ground force is the oldest of the Norwegian service branches, established as a modern military organization under the command of the King of Norway."
 NOR_norwegian_air_forces: "Fuerza Aérea Noruega"
 NOR_norwegian_air_forces_desc: "La fuerza aérea es tan necesaria como la marina para la primera defensa de Noruega. Nuestro terreno es muy accidentado, lo que convierte a Noruega en una potencial batalla aérea si llegara a producirse alguna. Lo más útil es que nuestra fuerza aérea puede utilizarse en todo el mundo como fuerza de mantenimiento de la paz si así lo deseamos."
 NOR_norwegian_airforce_academy: "Norwegian Air Force Academy"
 NOR_norwegian_airforce_academy_desc: "Al ser una nación pacífica, no vemos muchos conflictos, lo que nos permite ser los brillantes estrategas y pensadores militares de Europa."
 NOR_statoil_idea: "Statoil"
 NOR_gas_industry_renovation: "Renovaciones en la industria del gas"
 NOR_gas_industry_renovation_desc: "Debemos expandir nuestra industria del gas natural por ahora, ya que ser ecológico es un proceso largo y arduo. Además, considerando que al ser ecológicos, podemos usar el petróleo y el gas exclusivamente para la exportación, lo que nos permite obtener beneficios económicos."