 protests_main_text: "Precisamos atender às expectativas de nossos cidadãos para evitar protestos e outros desenvolvimentos sociais negativos.\nForça Atual de §YProtesto§!: [protest_strength_TT]\nAtual §YRadicalização§! de Protesto: [protest_radicalisation_TT][fuel_protests_TT]\n"
 OPEN_PROTESTS_BUTTON: "Open §YProtest System§! Screen"
 OPEN_PROTESTS_BUTTON_TT: "Esta tela conterá informações esquemáticas sobre gastos governamentais esperados, força do movimento de protesto esperado e radicalização."
 PROTEST_TITLE: "§YProtests System§!"
 CLOSE_PROTEST_SCREEN: "Close §YProtests System§! Screen"
 expected_law_mechanic_tt: "Purpose of §YProtests System§!\n"
 EL_green_square_explanation_tt: "Quadrados §Gverdes§! representam o nível de gastos exigido pelos nossos cidadãos e cobertos pelos nossos gastos atuais."
 EL_blue_square_explanation_tt: "Quadrados §Bazuis§! representam o nível de gastos NÃO exigido pelos nossos cidadãos, mas cobertos pelos nossos gastos atuais."
 EL_red_square_explanation_tt: "Quadrados §Vermelhos§! representam o nível de gastos exigido pelos nossos cidadãos e NÃO cobertos pelos nossos gastos atuais - esta é a fonte de protestos ganhando força."
 EL_white_square_explanation_tt: "Quadrados brancos representam possíveis níveis de gastos, que não são cobertos ou esperados."
 expected_social_spending_tt: "The following values represent the expected §YGovernment Expenditure§! on §YSocial Spending.§! Every whole number indictates a level of expected spending limited to the number of laws in the category.\n\nExpected Value of §YSocial Spending§! is §Y[expected_social_spending_law_name]§! (Current Value: [?expected_welfare_spending|0Y])\n\nBreakdown of Expected §YSocial Spending§!\n-----------\nLaw, National Spirits and Tech impact on §YExpected Social Spending§!: [?ROOT.modifier@expected_welfare_modifier]\nGDP/c Modifier on §YExpected Social Spending§!: [calculate_gdp_c_modifier_welfare_spending]\n"
