l_japanese:
 east_timor.1.t: "2006年の危機"
 east_timor.1.d: "東ティモール軍が地域対立によって分裂した。西部出身の兵士約600名が解雇されたことをきっかけに派閥抗争が発生し、首都ディリ全域に拡大している。政府は治安状況の制御を失いつつある。"
 east_timor.1.a: "国際平和維持活動の支援を要請する"
 east_timor.1.b: "我々自身で秩序を回復する"
 east_timor.2.t: "東ティモールが平和維持軍の派遣を要請"
 east_timor.2.d: "東ティモールが派閥抗争により混乱状態に陥り、秩序回復のためオーストラリアに軍事支援を要請している。この地域の最大の大国として、我々の対応が国際的な介入の方向性を決定づけることになるだろう。"
 east_timor.2.a: "国際安定化部隊を派遣する"
 east_timor.2.b: "現時点では介入できない"
 east_timor.3.t: "東ティモールが支援を要請"
 east_timor.3.d: "かつての植民地である東ティモールが混乱に陥る中、軍事支援を求めている。ポルトガルは歴史的な義務があり、ティモール人との間には強い絆が存在する。"
 east_timor.3.a: "平和維持部隊を派遣する"
 east_timor.3.b: "要請を拒否する"
 east_timor.4.t: "東ティモールが支援を要請"
 east_timor.4.d: "東ティモールは秩序回復のため、ニュージーランドに支援を要請した。この小さな国家は、広範囲にわたる暴力と治安体制の崩壊に苦しんでいる。"
 east_timor.4.a: "平和維持軍を派遣する"
 east_timor.4.b: "拒否する"
 east_timor.5.t: "東ティモール危機"
 east_timor.5.d: "東ティモールは国家を安定させるため、マレーシアの平和維持軍に支援を要請した。同じ東南アジアの国家として、マレーシアの参加は地域の連帯を示すことになるだろう。"
 east_timor.5.a: "ディリに軍隊を派遣する"
 east_timor.5.b: "要請を拒否する"
 east_timor.6.t: "オーストラリア軍が到着"
 east_timor.6.d: "オーストラリアの平和維持軍がディリに到着し、首都の秩序を回復させている。国際安定化部隊は、この平和維持作戦の主軸となっている。"
 east_timor.6.a: "我々は感謝している"
 east_timor.7.t: "ポルトガル軍が到着"
 east_timor.7.d: "ポルトガル軍が東ティモールに派遣され、かつての植民地に対する歴史的な義務を果たした。"
 east_timor.7.a: "友よ、歓迎する"
 east_timor.8.t: "ニュージーランドの平和維持部隊が到着"
 east_timor.8.d: "ニュージーランドは東ティモールの安定化を支援するため、平和維持部隊を派遣した。"
 east_timor.8.a: "彼らの協力に感謝する"
 east_timor.9.t: "マレーシア軍が到着"
 east_timor.9.d: "マレーシア軍が東ティモールでの平和維持作戦を支援するために到着した。"
 east_timor.9.a: "マレーシアに感謝する"
 east_timor.10.t: "アルフレド・レイナドの追跡"
 east_timor.10.d: "反乱の指導者であるアルフレド・レイナドは当局の追跡を逃れ、ディリ南部の山岳地帯に潜伏している。彼が自由の身であり続けることは、政府の権威を弱体化させ、他の反体制派を勢いづかせている。"
 east_timor.10.a: "オーストラリアに特殊部隊の派遣を要請する"
 east_timor.10.b: "我々の軍で彼を追う"
 east_timor.11.t: "東ティモールが特殊空挺部隊の支援を要請"
 east_timor.11.d: "東ティモールは、平和維持軍の追跡を逃れ続けている逃亡中の反乱指導者、アルフレド・レイナドを捕らえるため、オーストラリアに特殊空挺部隊の派遣を要請した。"
 east_timor.11.a: "特殊空挺部隊を投入する"
 east_timor.11.b: "これは我々の任務の範囲を超えている"
 east_timor.12.t: "レイナドの逃亡"
 east_timor.12.d: "オーストラリア特殊部隊の作戦にもかかわらず、アルフレド・レイナドは山岳地帯へと逃亡した。作戦は彼の拘束に失敗したが、より広範な国際的な存在感により、ディリの治安状況は安定した。"
 east_timor.12.a: "彼はいずれ見つかるだろう"
 east_timor_news.1.t: "国際部隊、東ティモールへ展開"
 east_timor_news.1.desc: "東ティモール政府からの正式な要請を受け、オーストラリアが主導する国際平和維持軍がディリへの展開を開始した。派閥抗争により、首都では数百人の死者や避難民が出ている。オーストラリア、ポルトガル、ニュージーランド、そしてマレーシアが、国際安定化部隊に兵力を提供している。"
 east_timor_news.1.a: "我々は世界の助力を期待している"
 east_timor_news.1.b: "我々がディリの秩序を回復してみせる"
 east_timor_news.1.c: "地域の安定は我々の利益にかなう"
 east_timor_news.1.d: "危機に瀕する小国"