l_japanese:
 pakistan.1.t: "部族地域へのアメリカの圧力"
 pakistan.1.d: "アメリカはパキスタンに対し、アフガニスタン国境沿いの連邦直轄部族地域から活動する武装勢力に対して、断固たる軍事行動を取るよう要求している。ワシントンは、これ以上の不作為は二国間関係やアメリカによる軍事援助に影響を及ぼすと明言した。"
 pakistan.1.a: "ワジリスタンで軍事作戦を開始する"
 pakistan.1.b: "代わりに部族の長老たちと交渉する"
 pakistan.1.c: "アメリカの要求を拒否する"
 pakistan.2.t: "パキスタンが部族地域での作戦を開始"
 pakistan.2.d: "パキスタンはアメリカの圧力に応じ、部族地域にある武装勢力の拠点に対する軍事作戦を開始した。この作戦は、アフガニスタン国境沿いのタリバンおよびアルカイダの勢力を標的としている。"
 pakistan.2.a: "好ましい進展だ"
 pakistan.3.t: "パキスタンが行動を拒否"
 pakistan.3.d: "パキスタンはアメリカの要求にもかかわらず、部族地域での断固たる軍事行動をとることを拒否している。武装勢力は依然としてアフガニスタン国境沿いで自由に行動しており、アフガニスタンにおける連合軍の取り組みを妨げている。"
 pakistan.3.a: "パキスタンへの軍事援助を削減する"
 pakistan.3.b: "今は彼らの決定を受け入れよう"
 pakistan.4.t: "武装勢力の報復"
 pakistan.4.d: "部族地域での軍事作戦は激しい報復を招いた。武装勢力は主要都市で爆破テロを相次いで実行し、政府機関、市場、軍事施設を標的としている。パキスタン・タリバン運動は国家に対して宣戦を布告した。"
 pakistan.4.a: "取り締まりを強化する"
 pakistan.4.b: "武装勢力との停戦を模索する"
 pakistan.5.t: "アメリカが援助を停止"
 pakistan.5.d: "アメリカは、パキスタン政府が部族地域における武装勢力への行動を拒否したことを受け、パキスタンへの軍事援助を停止した。アメリカからの資金が失われることは、国防予算の圧迫を招くだろう。"
 pakistan.5.a: "これは言語道断だ"
 pakistan.6.t: "部族地域での進展"
 pakistan.6.d: "数ヶ月に及ぶ継続的な軍事作戦を経て、パキスタン軍は部族地域で大きな進展を遂げた。多大な人的・経済的コストを支払うことになったが、武装勢力の主要な拠点は解体された。現在の問題は、勝利を宣言すべきか、あるいは恒久的な軍事駐留を維持すべきかという点にある。"
 pakistan.6.a: "勝利を宣言し、体制を固める"
 pakistan.6.b: "軍の駐留を維持する"
 PAK_waziristan_insurgency: "ワジリスタン紛争"
 PAK_waziristan_insurgency_desc: "パキスタン軍は部族地域において大規模な対ゲリラ作戦を展開しており、アフガニスタン国境沿いの武装勢力と交戦中である。"
 PAK_suspended_american_aid: "停止されたアメリカの援助"
 PAK_suspended_american_aid_desc: "アメリカがパキスタンへの軍事援助を停止したため、国防予算が圧迫され、兵器の獲得が制限されている。"
 PAK_tribal_pacification: "部族地域の平定"
 PAK_tribal_pacification_desc: "部族地域における軍事作戦の成功は、軍の対ゲリラ能力を強化し、国境地域にある程度の安定を取り戻した。"
 pakistan_news.1.t: "パキスタン、部族地域で軍事作戦を開始"
 pakistan_news.1.d: "パキスタン軍は、アフガニスタン国境沿いの連邦直轄部族地域にあるタリバンおよびアルカイダの拠点に対して大規模な軍事作戦を開始した。この攻勢はアメリカからの強い圧力の下で行われ、険しい地形を長年隠れ家として利用してきた武装勢力のネットワークを標的にしている。"
 pakistan_news.1.a: "彼らを根絶する"
 pakistan_news.1.b: "正しい方向への一歩だ"
 pakistan_news.1.c: "承知した"
 pakistan_news.2.t: "パキスタン、部族地域での勝利を宣言"
 pakistan_news.2.d: "長期にわたる軍事作戦を経て、パキスタンは部族地域における主要な武装勢力の拠点を解体したと発表した。この作戦は命と資源の両面で多大な代償を伴うものだったが、政府は国境地域の治安はここ数年で最も安全になったと述べている。"
 pakistan_news.2.a: "苦労の末に勝ち取った勝利"
 pakistan_news.2.b: "この進展を歓迎する"
 pakistan_news.2.c: "承知した"