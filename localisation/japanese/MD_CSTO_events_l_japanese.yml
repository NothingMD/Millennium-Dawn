l_japanese:
 CSTO.1.t: "[From.GetNameDef]がCSTOへの参加を希望"
 CSTO.1.d: "[From.GetAdjective]からの代表団が興味深い提案を持ち込んできた。その代表団は、[From.GetNameDef]が共同合意に署名してCSTOの一部になりたいと説明している。彼らは新たな友好宣言の署名と、[From.GetNameDef]の我々の同盟への加入を開始するための公聴会を求めている。"
 CSTO.1.a: "もちろんだ"
 CSTO.1.b: "ありえない"
 CSTO.2.t: "[SOV.GetNameDef]はCSTOへの参加を拒否"
 CSTO.2.d: "[SOV.GetNameDef]は我々のCSTOへの加盟要求を拒否した。"
 CSTO.2.a: "残念だ"
 CSTO.3.t: "CSTOへの招待"
 CSTO.3.d: "[SOV.GetNameDef]とその同盟国は我々をCSTOに招待したいと考えている。我々はどうするべきだろうか？"
 CSTO.3.a: "受け入れよう"
 CSTO.3.b: "そんなことに構っている時間はない"
 CSTO.4.t: "[ROOT.GetNameDef]がCSTOに加盟"
 CSTO.4.d: "[SOV.GetNameDef]と[ROOT.GetNameDef]は本日、[ROOT.GetNameDef]の集団安全保障条約機構への加入を発表した。[SOV.GetNameDef]と[ROOT.GetNameDef]はこれまでの対立を脇に置き、[ROOT.GetNameDef]がこの同盟に加わることが双方の最善の利益になると判断した。"
 CSTO.4.a: "素晴らしい日だ！"
 CSTO.4.b: "新たな盟友"
 CSTO.4.c: "面白い展開だ"
 CSTO.5.t: "[ROOT.GetNameDef]がCSTOを脱退！"
 CSTO.5.d: "[ROOT.GetNameDef]の指導者である[ROOT.GetLeader]は、本日、集団安全保障条約機構とその同盟から直ちに離脱する意向を表明した。このことは軍事同盟を弱体化させるだろう。"
 CSTO.5.a: "良い選択だ"
 CSTO.5.b: "興味深い"
 CSTO.6.t: "CSTOが全面的な軍事同盟に"
 CSTO.6.d: "政策の大幅な転換として、[SOV.GetNameDef]は、集団安全保障条約機構を全面的な攻守同盟へと再編することを発表した。加盟国は今後、防衛戦争だけでなく、同盟の指導者が宣戦布告したあらゆる戦争に参加する義務を負うことになる。これは[SOV.GetAdjective]の軍事的野心の著しい拡大を示すものであり、西側諸国に懸念を引き起こしている。"
 CSTO.6.a: "我々はモスクワと共に立つ"
 CSTO.6.b: "懸念すべき展開だ"
 CSTO_management: "CSTOの運営"
 SOV_convert_csto_to_offensive: "CSTOを攻守同盟へ再編"
 SOV_convert_csto_to_offensive_desc: "現在、CSTOは防守同盟として運用されており、加盟国を参戦要請できるのは我々が攻撃された場合に限られる。条約を再編することで、これを全面的な軍事同盟へと変え、攻勢作戦を含む我々のあらゆる戦争に加盟国が参加しなければならないようにできる。これにより、我々が仕掛けた紛争にも、同盟国や傀儡国家を呼び寄せられるようになる。"
 SOV_csto_has_at_least_one_member_tt: "CSTOには自国以外の加盟国がいる"