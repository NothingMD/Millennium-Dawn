 SOO_help_ossetia_SOV: "Inwestycje w §Y[SOO.GetNameWithFlag]§!"
 SOO_help_ossetia_SOV_desc: "Będziemy wspierać finansowo budżet Osetii Południowej, gdyż samo to państwo nie jest w stanie tego zrobić. Dodatkowy dochód: $§R-0.120§!"
 SOO_help_ossetia: "Inwestycje z §Y[SOV.GetNameWithFlag]§!"
 SOO_help_ossetia_desc: "Rosja zapewnia nam środki finansowe, co pozwala naszej gospodarce utrzymać się na rynku. Dodatkowy dochód: $§G0.120§!"
 SOO_develop_turism: "Rozwoju Turystyki"
 SOO_develop_turism_desc: "Będziemy rozwijać turystykę krajową, która powinna przynosić dodatkowe dochody do naszej skarbnicy. Dodatkowy dochód: $§G0.100§!"
 SOO_Mamison_path: "Przełęcz Mamison"
 SOO_Mamison_path_desc: ""
 SOO_hydroelectric_dams: "Systemy mikrohydroenergetyki"
 SOO_Tskhinvali_district: "Rejon Cchinwali"
 SOO_GAS_Electrical_lines: "Linie gazowe i elektryczne"
 SOO_Java_townlet: "Miasteczko Jawy"
 SOO_reinforced_roads: "Wzmocnione drogi"
 SOO_subsidise_the_Farmers: "Dopłaty dla rolników"
 SOO_subsidise_the_Farmers_desc: "Our country is very poor; we need to use every opportunity to generate income for the budget. We will try to stimulate our farmers."
 SOO_Roki_Tunnel_tollage: "Napraw tunel Roki"
 SOO_Roki_Tunnel_tollage_desc: "We need to repair this tunnel, because it is our only connection to Russia."
 SOO_Tskhinvali_gas_and_electricity_network: "Zaopatrzenie w energię Cchinwali"
 SOO_Tskhinvali_gas_and_electricity_network_desc: "We will provide Tskhinvali with everything it needs in terms of energy."
 SOO_Move_towards_cash_crop_growth: "Zwiększ obroty handlowe z Rosją"
 SOO_Move_towards_cash_crop_growth_desc: "We are ready to increase the supply of our agricultural products to Russia."
 SOO_Rural_Revitalization: "Zainwestuj w odbudowę infrastruktury"
 SOO_Rural_Revitalization_desc: "We need to restore our roads, which have fallen into disrepair over many years."
 SOO_konserv_zavod: "Otwórz fabrykę konserw"
 SOO_konserv_zavod_desc: "We will open a cannery in our country, providing people with jobs and generating a healthy profit."
 SOO_Redevelop_the_Mamison_Pass: "Przebuduj przełęcz Mamison"
 SOO_Redevelop_the_Mamison_Pass_desc: "The Mamison Pass is a rugged mountain pass on the Ossetia-Russia border. The Ossetian Military Road, constructed by the Russian Empire between 1854 and 1889, crosses it, though today it is heavily overshadowed by the Transcaucasian Highway."
 SOO_The_Ergneti_market: "Targ Ergneti"
 SOO_The_Ergneti_market_desc: "Ergneti is a village on the outskirts of Tskhinvali located on the Georgian side of the border. What began as a place where local Georgian inhabitants would buy cheap Russian goods has sprawled into an all-encompassing black market where commodities from agricultural produce to industrial goods are traded. The Ergneti market has become the most reliable and sustainable source of income for thousands of Ossetians and Georgians alike."
 SOO_Sponsor_the_Georgian_grey_market: "Sponsoruj gruziński szary rynek"
 SOO_Sponsor_the_Georgian_grey_market_desc: "The Georgian grey market has grown out of the flood of Russian goods flowing into the region, with the bulk of them crossing the Ossetian border down from the Transcaucasian Highway. Sponsoring the grey market could lead to an untapped source of income for a needy state such as ours."
 SOO_fostering_economic_ties: "Wzmacnianie powiązań gospodarczych"
 SOO_fostering_economic_ties_desc: "Ergneti has served as a building block towards peace between South Ossetia and Georgia. To stay on a path of stable growth, we must take the opportunity to forge closer ties with the Georgian state."
 SOO_tourism: "Turystyka w Osetii Południowej"
 SOO_tourism_desc: "Our country has beautiful landscapes and views. It is time to develop the infrastructure needed for tourists to access this beauty."
 SOO_A_Shifting_market: "Zmieniający się rynek"
 SOO_A_Shifting_market_desc: "The Georgian government has shut down the market. We must plan for the nation's future and tackle this issue; with many losing their jobs, we are forced to adapt by aligning with more Russian aid and a larger focus on contraband and other illegal sources of trade."
 SOO_Host_transit_tax: "Podatek tranzytowy gospodarza"
 SOO_Host_transit_tax_desc: "The Ergneti market still operates as a black market. To tap our untapped income, we can set up a transit tax on the Ossetian side of the border. This may be an unwelcome imposition for many, but the revenue stays within our own state rather than flowing to the neighbour across the border."
 SOO_Promote_contraband: "Promuj kontrabandę"
 SOO_Promote_contraband_desc: "With the recent shutdown of the market by the Georgian government, we are required to source income by other means. Large parts of the population on both sides of the border are upset with Georgia's takedown of the market. We are now forced into the trade of contraband goods."
 SOO_regulate_the_market: "Regulamin Rynku"
 SOO_regulate_the_market_desc: "Market regulations are required to root out illegal behaviour. This will make it more appealing for the Georgian side to keep the market open even in times of change or rising tensions."
 SOO_Districted_Oversight: "Nadzór Okręgowy"
 SOO_Districted_Oversight_desc: "With this new-found administration, the governing body of the Georgian territories must begin the process of integrating the population into the customs and laws of the Ossetian state."
 SOO_Resilient_Commerce: "Odporny handel"
 SOO_Resilient_Commerce_desc: "We will trade more actively than before to expand our economic potential."
 SOO_Raise_Import_Tariffs: "Podnieść cła importowe"
 SOO_Raise_Import_Tariffs_desc: "We will raise import tariffs to improve revenues for our treasury."
 SOO_the_Russian_bankroll: "Wpuść rosyjskie banki"
 SOO_the_Russian_bankroll_desc: "We will have to allow Russian banks to enter our market to support our economy."
 SOO_new_developments_in_Kvaisa: "Energia Osetii"
 SOO_new_developments_in_Kvaisa_desc: "We will begin the construction of a power plant to ensure our energy security."
 SOO_Boost_the_local_flour_production: "Inwestycje w produkcję mąki"
 SOO_Boost_the_local_flour_production_desc: "Our state should invest in all agricultural sectors, beginning with local flour production."
 SOO_Tractor_Imports: "Import traktorów"
 SOO_Tractor_Imports_desc: "We will import tractors to meet the needs of our agricultural sector."
 SOO_Forestry_Development: "Przemysł leśny"
 SOO_Forestry_Development_desc: "We will work to develop our forestry industry once again."
 SOO_increase_tolls_on_Roki_Tunnel: "Zwiększyć opłaty za przejazd tunelem Roki"
 SOO_increase_tolls_on_Roki_Tunnel_desc: "We will raise the tolls charged in the Roki Tunnel."
 SOO_South_Ossetian_State_University: "Południowoosetyjski Uniwersytet Państwowy"
 SOO_South_Ossetian_State_University_desc: "Our republic needs the best minds. Investing in higher education will secure our future."
 SOO_Dzuarikau_Tskhinvali_pipeline: "Naprawiony rurociąg naftowy"
 SOO_Dzuarikau_Tskhinvali_pipeline_desc: "This gas pipeline is vital for our energy supply."
 SOO_Develop_Tskhinvali: "Infrastruktura Cchinwali"
 SOO_Develop_Tskhinvali_desc: "Local roads in Tskhinvali are clearly in need of repair."
 SOO_Develop_Java: "Przywrócenie Javy"
 SOO_Develop_Java_desc: "This settlement is also in need of financial investment."
 SOO_Revive_soviet_era_works: "Ożywić dziedzictwo sowieckie"
 SOO_Revive_soviet_era_works_desc: "It is time to restore what was lost and destroyed over the years — the legacy of the USSR."
 SOO_Develop_Gori: "Rozwój Gori"
 SOO_Develop_Gori_desc: "The new territories of our republic must also be developed."
 SOO_private_sector: "Sektor prywatny"
 SOO_private_sector_desc: "We will promote the development of the private sector throughout our republic."
 SOO_Geared_for_hardship: "Trudności rozwojowe"
 SOO_Geared_for_hardship_desc: "We have a long way to go in developing and reviving our economy — specifically agriculture."
 SOO_Gori_Tskhinvali_rail_link: "Trasa transportowa Gori – Cchinwali"
 SOO_Gori_Tskhinvali_rail_link_desc: "We will connect our new territory with the rest of the republic."
 SOO_Ministry_of_internal_affairs: "MSW"
 SOO_Ministry_of_internal_affairs_desc: "Our republic should be able to sleep peacefully."
 SOO_Reinforce_Parliamentary_administration: "Zmień kierownictwo parlamentu"
 SOO_Reinforce_Parliamentary_administration_desc: "It is time for new people in politics."
 SOO_Dismantle_Parliamentary_Dominance: "Zniesienie dominacji parlamentu"
 SOO_Dismantle_Parliamentary_Dominance_desc: "Parliament should not rule the country alone."
 SOO_Downplay_opposition_forces: "Zdusić opozycję"
 SOO_Downplay_opposition_forces_desc: "The opposition, in the form that it exists now, threatens our republic and its stability."
 SOO_banner_of_the_people: "Sztandar Ludu"
 SOO_banner_of_the_people_desc: "Prawdziwi synowie Osetii są gotowi bronić naszego kraju"
 SOO_Political_independent: "Niezależność polityczna"
 SOO_Political_independent_desc: "Our policy will be less subject to the influence of any one person or group."
 SOO_Defenders_of_the_Fatherland: "Obrońcy Ojczyzny"
 SOO_Defenders_of_the_Fatherland_desc: "Nasi bojownicy będą walczyć do końca za naszą ojczyznę"
 SOO_Evaluate_the_existing_constitution: "Oceń obecną konstytucję"
 SOO_Evaluate_the_existing_constitution_desc: "Maybe it is time to change the existing constitution?"
 SOO_Allow_presidential_constitution_changes: "Poprawka do konstytucji prezydenta"
 SOO_Allow_presidential_constitution_changes_desc: "Our president has his own vision for the constitution."
 SOO_The_Regal_Relinquishment: "Nowe życie polityczne"
 SOO_The_Regal_Relinquishment_desc: "It is time to breathe new life into our republic's political landscape."
 SOO_Reform_the_distribution_of_farmland: "Reforma rolna"
 SOO_Reform_the_distribution_of_farmland_desc: "The main source of our income is agricultural products. We must reform this industry wisely."
 SOO_The_Kremlin_state: "Państwo Prokremlowskie"
 SOO_The_Kremlin_state_desc: "Nie mamy już sojuszników poza Rosją."
 SOO_Ossetian_Patriotism_Reforms: "Patriotyzm osetyjski"
 SOO_Ossetian_Patriotism_Reforms_desc: "Everyone should be aware of their duty and ready to fight for our homeland."
 SOO_adopted_a_new_constitution: "Nowa Konstytucja"
 SOO_adopted_a_new_constitution_desc: "It is time to adopt a new constitution."
 SOO_Enduring_the_Sovereignty_Fight: "Kontynuuj walkę o niepodległość"
 SOO_Enduring_the_Sovereignty_Fight_desc: "As long as we are not part of Russia, we will have to fight for our independence."
 SOO_pro_russian: "Kurs prorosyjski"
 SOO_pro_russian_desc: "Our ultimate goal is reunification with our brothers in North Ossetia and with Russia."
 SOO_integrate_to_russian_army: "Integracja z Armią Rosyjską"
 SOO_integrate_to_russian_army_desc: "We are ready to fully integrate into the Russian army."
 SOO_referendum: "Referendum w sprawie przyłączenia się do Rosji"
 SOO_referendum_desc: "We have been working toward this for a long time. It is time to hold this referendum."
 SOO_invest: "Inwestycje w naszą gospodarkę"
 SOO_invest_desc: "Russia is generously ready to invest in our economy."
 SOO_rosbanks: "Banki Rosyjskie"
 SOO_rosbanks_desc: "Russian banks are ready to enter our territory. This will strengthen our economy."
 SOO_inverv_warfrare: "Rosyjska doktryna interwencji wojskowej"
 SOO_inverv_warfrare_desc: "We will follow the military doctrine of our country and actively participate in world conflicts."
 SOO_fight_start: "Rozpocznij walkę o wolność Osetii"
 SOO_fight_start_desc: "The Tadeev clan has terrorized our country for too long. It is time to deal with them."
 SOO_fight_narcota: "Zatrzymaj dystrybucję narkotyków"
 SOO_fight_narcota_desc: "Wyeliminujemy wszystkie osoby powiązane z Tedeevami, zaangażowane w handel narkotykami"
 SOO_fight_contrabanda: "Zwalcz nielegalny przemyt"
 SOO_fight_contrabanda_desc: "The Tadeev smuggling networks will be destroyed forever."
 SOO_fight_alchohol: "Suppress Illegal Alcohol"
 SOO_fight_alchohol_desc: "Illegal alcohol will no longer appear in our country."
 SOO_fight_reket: "Pokonaj rakietę"
 SOO_fight_reket_desc: "We will put an end to their attempts to extort entrepreneurs in our country."
 SOO_fight_orujie: "Zniszczyć kanały przemytu broni"
 SOO_fight_orujie_desc: "Weapons will no longer flow through our country illegally."
 SOO_fight_tamojnia: "Usuń skorumpowanych celników"
 SOO_fight_tamojnia_desc: "We will remove all disloyal employees from our customs service."
 SOO_fight_kgb: "Rozpraw się z korupcją w KGB"
 SOO_fight_kgb_desc: "Even within the KGB, the Tadeevs found people who could be bribed. It is time to end this."
 SOO_fight_minor: "Usuń skorumpowanych urzędników z Ministerstwa Edukacji"
 SOO_fight_minor_desc: "The last Tadeev informant sits in the Ministry of Education, giving the clan a foothold over the country. It is time to deal with her."
 SOO_end_fight: "Wyzwolić Kraj"
 SOO_end_fight_desc: "Finally, our country can breathe a sigh of peace."
 SOO_prepare_for_war: "Przygotowanie do wojny"
 SOO_prepare_for_war_desc: "War is inevitable. We must be ready for it."
 SOO_call_abkhazia: "Apel do Abchazji"
 SOO_call_abkhazia_desc: "We and the Abkhazians must stand together to counter the threat from Georgia."
 SOO_establish_connection_with_kavkaz: "Unia Z Czeczenią"
 SOO_establish_connection_with_kavkaz_desc: "Perhaps the Chechens will help us again, as they did in the 90s."
 SOO_ossetia_at_war: "Doświadczenie na polu bitwy"
 SOO_ossetia_at_war_desc: "Teraz na polu bitwy stajemy się silniejsi i bardziej doświadczeni"
 SOO_lessons_from_war: "Lekcje wojny"
 SOO_lessons_from_war_desc: "The experience of this war has taught us a great deal."
 SOO_new_defences: "Nowe inwestycje wojskowe"
 SOO_new_defences_desc: "We will increase our investments in the military sector."
 SOO_doctrine_update: "Zaktualizowana doktryna wojskowa"
 SOO_doctrine_update_desc: "Our military doctrine is in need of some adjustment."
 SOO_north_ossetia_ratnik: "W pełni wyposaż armię w „Ratnika”"
 SOO_north_ossetia_ratnik_desc: "Rosyjski sprzęt wojskowy będzie najlepszą opcją dla naszej armii"
 SOO_submission_to_the_russian_doctrine: "Poddanie się doktrynie rosyjskiej"
 SOO_submission_to_the_russian_doctrine_desc: "Całkowicie przejdziemy na doktrynę rosyjską"
 SOO_Gori_pereseleniye: "Osada Gori"
 SOO_Gori_pereseleniye_desc: "We will allow our citizens to settle in this territory."
 SOO_foreign_relations: "Dyplomacja międzynarodowa"
 SOO_foreign_relations_desc: "We need to establish international relations."
 SOO_reinforce_sng2: "Partnerzy WNP-2"
 SOO_reinforce_sng2_desc: "Our closest partners are members of the CIS-2."
 SOO_russian_ms: "Współpraca z przemysłem wojskowym Rosji"
 SOO_russian_ms_desc: "Russian military equipment is the best option for us to purchase — and the only one."
 SOO_russian_arms: "Kup rosyjskie czołgi"
 SOO_russian_arms_desc: "With Russian tanks, we can go anywhere."
 SOO_transnistria_accept: "Przemyt z Naddniestrza"
 SOO_transnistria_accept_desc: "Pridnestrovian weapons depots will be of great interest to our country."
 SOO_abkahz_relations: "Poprawa stosunków z Abchazami"
 SOO_abkahz_relations_desc: "Abkhazians and Ossetians are brothers forever."
 SOO_abkahz_def_pact: "Pakt obronny z Abchazją"
 SOO_abkahz_def_pact_desc: "We must be ready to defend ourselves together with the Abkhazians."
 SOO_trade_abk_def: "Handel z Abchazją"
 SOO_trade_abk_def_desc: "It is necessary to establish trade relations with Abkhazia."
 SOO_syria_relations: "Braterski Naród Syryjski"
 SOO_syria_relations_desc: "Syria has turned out to be an unexpected partner, one with whom it is worth establishing closer relations."
 SOO_venez_relations: "Interakcja z Wenezuelą"
 SOO_venez_relations_desc: "Despite the great distance, we are ready to establish cooperation with Venezuela."
 SOO_shara_relat: "Interakcja z Saharą Południową"
 SOO_shara_relat_desc: "Despite the great distance, we are ready to establish cooperation with Southern Sahara."
 SOO_nikar_relations: "Interakcja z Nikaraguą"
 SOO_nikar_relations_desc: "Despite the great distance, we are ready to establish cooperation with Nicaragua."
 SOO_artsakh_relations: "Interakcja z Artsakhem"
 SOO_artsakh_relations_desc: "Our partners and brothers from Artsakh will be excellent allies."
 SOO_artsakh_volunteers: "Wolontariusze z Artsakh"
 SOO_artsakh_volunteers_desc: "Volunteers from Artsakh have come to help our country."
 SOO_approach_armenia: "Wesprzyj Armenię"
 SOO_approach_armenia_desc: "Armenians and we are fraternal peoples, and we will help each other in everything."
 SOO_economic_pizda: "Inwestycje rosyjskie"
 SOO_economic_pizda_desc: "Russia is ready to invest in our country."
 SOO_nykhaz_russian_partnership: "Rozwój partnerstwa z Rosją"
 SOO_nykhaz_russian_partnership_desc: "We will expand our partnership with Russia."
 SOO_further_integr_osset: "Integracja z Osetią Północną"
 SOO_further_integr_osset_desc: "We are ready for integration with North Ossetia."
 SOO_podchistit_polit_pole: "Oczyść pole polityczne"
 SOO_podchistit_polit_pole_desc: "It is time to clean up our political enemies."
 SOO_north_ssetian_dobrovol_army: "Ochotnicy z Osetii Północnej"
 SOO_north_ssetian_dobrovol_army_desc: "Many volunteers from North Ossetia have come to our country."
 SOO_new_ak_rifles: "Licencja na nowe modele Kałasznikowa"
 SOO_new_ak_rifles_desc: "We are ready to begin licensed production of the latest Kalashnikov assault rifle models on our territory."
 SOO_iron_Iroon: "Żelazna Alanya"
 SOO_iron_Iroon_desc: "We will be as strong as the steel that forged the swords and armor of our ancestors — the Alans."
 SOO_native_faith: "Nasza prawdziwa religia"
 SOO_native_faith_desc: "It is time for our people to open their eyes and accept the true religion."
 SOO_revive_alan_spirit: "Ożyw ducha Alanyi"
 SOO_revive_alan_spirit_desc: "Rozpoczęło się duchowe odrodzenie naszego narodu"
 SOO_eurasian_ambitions: "Ambicje eurazjatyckie"
 SOO_eurasian_ambitions_desc: "Nasze ambicje sięgają daleko poza horyzonty"
 SOO_influence_iran: "Wpływ w Iranie"
 SOO_influence_iran_desc: "Będziemy rozszerzać nasze wpływy na Iran, a mianowicie na mieszkających tam Zoroastrian"
 SOO_zoroastr_reb_iran: "Powstanie Zoroastrian w Iranie"
 SOO_zoroastr_reb_iran_desc: "Zoroastryjczycy w Iranie są gotowi zbuntować się przeciwko obecnemu rządowi!"
 SOO_influence_russian_pagans: "Wpływ na rosyjskie pogaństwo"
 SOO_influence_russian_pagans_desc: "Friendship with pagans from Russia will bear fruit in the future."
 SOO_coup_in_armenia: "Braterstwo z Armenią"
 SOO_coup_in_armenia_desc: "It is time for Armenia to become a part of our great plan."
 SOO_coup_kob: "Nadszedł czas, aby zniszczyć egipskich kapłanów"
 SOO_coup_kob_desc: "Nadszedł czas, aby nasze narody walczyły ze wspólnym wrogiem"
 SOO_greater_scythia: "Wielka Scytia"
