 SOO_natpop_modifier: "Polityka Ludowa Osetii Południowej"
 SOO_natpop_modifier_desc: "Partia Ludowa stara się dać narodowi Osetii Południowej to, co najlepsze, ale ze względu na dość niejasny program polityczny jest mało prawdopodobne, aby wyszło to idealnie."
 SOO_nyhaz_modifier: "Militarystyczna polityka popularna"
