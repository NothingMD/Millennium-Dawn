 md_negative_nuclear_fuel_Desc: "Twoje reaktory jądrowe zużywają więcej paliwa niż jest produkowane. Przejdź do zakładki „Budowa”, aby zarządzać energią."
 md_negative_expected_social_spending_Desc: "Obecne przepisy dotyczące opieki społecznej są niższe, niż oczekuje tego społeczeństwo. Przejdź do zakładki Polityka, aby zwiększyć wydatki socjalne."
 md_negative_expected_healthcare_spending_Desc: "Obecne przepisy dotyczące opieki zdrowotnej są poniżej oczekiwań społeczeństwa. Przejdź do zakładki Polityka, aby zwiększyć wydatki na opiekę zdrowotną."
 md_negative_expected_administrative_spending_Desc: "Twoja obecna biurokracja jest niższa, niż oczekuje tego twoja populacja. Przejdź do zakładki Polityka, aby zwiększyć wydatki administracyjne."
 md_negative_expected_education_spending_Desc: "Twoje obecne przepisy dotyczące edukacji są poniżej oczekiwań społeczeństwa. Przejdź do zakładki Polityka, aby zwiększyć wydatki na edukację."
 md_negative_expected_police_spending_Desc: "Twój obecny budżet na policję jest niższy, niż oczekuje tego społeczeństwo. Przejdź do zakładki Polityka, aby zwiększyć wydatki na policję."
 md_negative_expected_defense_spending_Desc: "Twoje obecne wydatki na wojsko są niższe, niż oczekuje tego społeczeństwo. Przejdź do zakładki Polityka, aby zwiększyć wydatki na obronność."
 md_negative_eletricity_Desc: "Twoja obecna produkcja energii nie pokrywa całkowitego zapotrzebowania. Przejdź do zakładki Budowa, aby wybudować dodatkowe elektrownie lub dostosować zużycie energii."
 md_available_tech_slot_expansion_Desc: "Twój PKB lub PKB na mieszkańca wzrósł na tyle, że odblokowałeś nowy slot badawczy. Przejdź do zakładki Technologia, aby go odebrać."