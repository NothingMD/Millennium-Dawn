l_polish:
 reserve_currency: "Polityka waluty rezerwowej"
 reserve_currency_desc: "Waluta stanowiąca podstawę rezerw monetarnych i długu międzynarodowego tego kraju. Kraje, które stowarzyszają się z jedną z głównych walut rezerwowych, zyskują dostęp do jej sieci płynności i infrastruktury rozliczeniowej, podczas gdy kraje utrzymujące rezerwy krajowe zachowują pełną suwerenność monetarną kosztem dostępu do kredytów międzynarodowych."
 us_dollar: "[1182.owner.GetAdjective] Dolar"
 us_dollar_desc: "Dominująca globalna waluta rezerwowa. Utrzymywanie rezerw w dolarach zapewnia niezrównaną płynność i dostęp do międzynarodowych rynków kredytowych, ale naraża kraj na koszty zadłużenia denominowanego w dolarach, które rosną wraz ze spadkiem wartości waluty krajowej."
 euro: "Euro"
 euro_desc: "Waluta Unii Europejskiej, druga najczęściej wymienialna waluta rezerwowa na świecie. Euro, dostępne dla państw członkowskich UE, zapewnia regionalną stabilność monetarną i preferencyjny dostęp do europejskich rynków kapitałowych."
 chinese_yuan: "[547.owner.GetAdjective] Yuan"
 chinese_yuan_desc: "Renminbi, chińska waluta narodowa, to rozwijający się instrument rezerwowy, promowany przez Pekin jako alternatywa dla dominacji dolara. Partnerzy handlowi w chińskiej orbicie ekonomicznej korzystają z rosnącej sieci rozliczeniowej."
 russia_rouble: "[652.owner.GetAdjective] Rubel"
 russia_rouble_desc: "Waluta Federacji Rosyjskiej, używana w ramach Eurazjatyckiej Unii Gospodarczej oraz między partnerami handlowymi postsowieckimi. Posiadanie rezerw rubla integruje kraj z alternatywnymi systemami płatności i rozliczeń energetycznych Rosji."
 japanese_yen: "[615.owner.GetAdjective] Jen"
 japanese_yen_desc: "Waluta Japonii i trzecia najczęściej wymienialna waluta na świecie. Kraje w strefie ekonomicznej Japonii korzystają z rozbudowanych sieci osadniczych i względnej stabilności jena, choć jego przyjęcie w rezerwach poza Azją Wschodnią pozostaje ograniczone."
 british_pound: "[13.owner.GetAdjective] Funt"
 british_pound_desc: "Najstarsza waluta rezerwowa, która nadal jest aktywnie używana na arenie międzynarodowej. Funt stanowi podstawę przepływów handlowych i finansowych w całej Wspólnocie Narodów i utrzymuje znaczącą pozycję w globalnych rezerwach walutowych, oferując krajom powiązanym z Wielką Brytanią stabilny dostęp do głębokich londyńskich rynków kapitałowych."
 swiss_frank: "[74.owner.GetAdjective] Frank"
 swiss_frank_desc: "Waluta Szwajcarii, znana na całym świecie jako bezpieczna przystań. Choć rzadko przyjmowana jako formalna waluta rezerwowa przez inne kraje, surowa dyscyplina monetarna franka i neutralność polityczna Szwajcarii sprawiają, że jest on wyjątkowo odporny na kryzysy walutowe i wstrząsy zewnętrzne."
 no_foreign_reserve: "Rezerwa krajowa"
 no_foreign_reserve_desc: "Ten kraj utrzymuje swoje rezerwy w walucie krajowej, a nie w walucie obcej. Zachowuje pełną suwerenność monetarną i izoluje się od zewnętrznych szoków kursowych, ale rezygnuje z dostępu do sieci płynności i międzynarodowych instrumentów kredytowych powiązanych z głównymi walutami rezerwowymi."
 currency_strength_modifier: "Siła waluty"
 reserve_roi_bonus: "Zwrot z inwestycji w walutę rezerwową"
 reserve_roi_bonus_desc: "Dodatkowy zwrot z inwestycji wynikający z posiadania silnej waluty rezerwowej. Skaluje się co miesiąc wraz z siłą waluty emitenta i rozmiarem sieci adopcyjnej — słabnąca gospodarka emitenta zmniejsza tę premię."
 reserve_trade_bonus: "Dostosowanie handlu walutami rezerwowymi"
 reserve_trade_bonus_desc: "Niewielki bonus w opinii handlowej wynikający z działania w ramach tego samego bloku walutowego. Odzwierciedla preferencyjne relacje handlowe i infrastrukturę płatniczą współdzieloną przez kraje używające tej samej waluty rezerwowej."
 seigniorage_income_modifier: "Dochód z tytułu senioratu"
 monetary_policy_decisions: "Polityka pieniężna"
 monetary_policy_expand_money_supply: "Zwiększ podaż pieniądza"
 monetary_policy_expand_money_supply_desc: "Nakazać bankowi centralnemu zwiększenie podaży pieniądza. Kraje emitujące waluty rezerwowe odnoszą największe korzyści, ponieważ popyt zagraniczny na ich walutę absorbuje znaczną część presji inflacyjnej. Wszystkie kraje borykają się z osłabieniem waluty w pewnym stopniu."
 monetary_policy_austerity: "Środki oszczędnościowe"
 monetary_policy_austerity_desc: "Zaostrzenie polityki fiskalnej i ograniczenie podaży pieniądza. Zmniejsza to krótkoterminową presję na dochody, ale wzmacnia walutę i dyscyplinuje budżet państwa."
 currency_backing: "Zabezpieczenie walutowe"
 currency_backing_desc: "Standard aktywów stanowiący podstawę waluty krajowej. Standardy twardej waluty wiążą walutę z rezerwą surowcową, narzucając dyscyplinę, ale ograniczając elastyczność monetarną. Systemy fiducjarne umożliwiają pełną suwerenność monetarną kosztem większego ryzyka inflacyjnego."
 gold_standard_back: "Standart złota"
 gold_standard_back_desc: "Waluta krajowa jest powiązana ze złotem i wymienialna na nie po stałym kursie. Ekspansja monetarna jest ograniczona przez fizyczne rezerwy złota, co buduje długoterminowe zaufanie, ale ogranicza zdolność rządu do reagowania na kryzysy gospodarcze."
 silver_standard: "Standard srebra"
 silver_standard_desc: "Waluta narodowa jest zabezpieczona rezerwami srebra po stałym kursie wymiany. Standard srebra, mniej restrykcyjny niż system oparty na złocie, zapewnia pewien stopień dyscypliny surowcowej, jednocześnie umożliwiając nieco większą elastyczność monetarną."
 bi_metal_standard: "Norma bimetaliczna"
 bi_metal_standard_desc: "Waluta jest zabezpieczona zarówno złotem, jak i srebrem, po stałych kursach wymiany. Ten standard, tradycyjnie stosowany w celu poszerzenia bazy monetarnej, równoważy dyscyplinę surowcową z większą elastycznością podaży niż system oparty wyłącznie na jednym metalu."
 no_currency_backing: "Waluta Fiata"
 no_currency_backing_desc: "Waluta jest wspierana wyłącznie autorytetem i wiarygodnością kredytową emitującego ją rządu. Bez ograniczeń surowcowych polityka pieniężna jest w pełni elastyczna – umożliwiając szybką reakcję kryzysową, ale zwiększając podatność na presję inflacyjną."