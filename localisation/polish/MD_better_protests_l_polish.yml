 EL_green_square_explanation_tt: "§GZielone§! kwadraty reprezentują poziom wydatków wymaganych przez naszych obywateli i objętych naszymi bieżącymi wydatkami."
 EL_blue_square_explanation_tt: "§BNiebieskie§! kwadraty reprezentują poziom wydatków NIE wymaganych przez naszych obywateli, ale objętych naszymi bieżącymi wydatkami."
 EL_red_square_explanation_tt: "§RCzerwone§! kwadraty reprezentują poziom wydatków wymaganych przez naszych obywateli i NIE objętych naszymi obecnymi wydatkami - stąd przybierają na sile protesty."
 EL_white_square_explanation_tt: "Białe kwadraty przedstawiają możliwe poziomy wydatków, które nie są ujęte lub oczekiwane."
